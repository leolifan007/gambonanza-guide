      <rect x="176" y="0" width="44" height="44" fill="#120812" stroke="#555" stroke-width="1" stroke-dasharray="3,3" rx="3"/><text x="198" y="27" fill="#555" font-size="20" text-anchor="middle" dominant-baseline="central">?</text>
      <rect x="0" y="44" width="44" height="44" fill="#120812" stroke="#555" stroke-width="1" stroke-dasharray="3,3" rx="3"/><text x="22" y="71" fill="#555" font-size="20" text-anchor="middle" dominant-baseline="central">?</text>
      <rect x="44" y="44" width="44" height="44" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1" rx="3"/><text x="66" y="71" class="ps">♜</text>
