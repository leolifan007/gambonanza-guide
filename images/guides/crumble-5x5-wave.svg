  <!-- Legend -->
  <g transform="translate(20,305)">
    <rect x="0" y="0" width="14" height="14" fill="#142E1A" stroke="#F0A030" stroke-width="1.5" rx="2"/><text x="20" y="12" fill="#81C784" font-size="11" font-weight="bold">S = Queen (center)</text>
    <rect x="160" y="0" width="14" height="14" fill="#2D1A2D" stroke="#F0A030" stroke-width="1" rx="2"/><text x="180" y="12" fill="#F0A030" font-size="11">A = Rook (mid-ring)</text>
    <rect x="320" y="0" width="14" height="14" fill="#1C0A14" stroke="#C08870" stroke-width="1" rx="2"/><text x="340" y="12" fill="#C08870" font-size="11">B = Knight (bridge)</text>
    <rect x="480" y="0" width="14" height="14" fill="#2A1420" stroke="#D44030" stroke-width="1.5" rx="2"/><text x="500" y="12" fill="#D44030" font-size="11">C/D = Pawn (edge)</text>
    <rect x="0" y="20" width="14" height="14" fill="#120812" stroke="#555" stroke-width="1" stroke-dasharray="3,3" rx="2"/><text x="20" y="32" fill="#555" font-size="11">? = Gone</text>
