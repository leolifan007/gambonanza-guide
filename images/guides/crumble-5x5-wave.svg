      <rect x="176" y="44" width="44" height="44" fill="#120812" stroke="#555" stroke-width="1" stroke-dasharray="3,3" rx="3"/><text x="198" y="71" fill="#555" font-size="20" text-anchor="middle" dominant-baseline="central">?</text>
      <rect x="0" y="88" width="44" height="44" class="cl" rx="3"/><text x="22" y="115" class="pw">♞</text>
      <rect x="44" y="88" width="44" height="44" class="cd" rx="3"/><text x="66" y="115" class="ps">♜</text>
      <rect x="88" y="88" width="44" height="44" class="hl" rx="3"/><text x="110" y="115" class="ps" font-size="26">♛</text>
