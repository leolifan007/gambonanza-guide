      <rect x="0" y="132" width="44" height="44" fill="#120812" stroke="#555" stroke-width="1" stroke-dasharray="3,3" rx="3"/><text x="22" y="159" fill="#555" font-size="20" text-anchor="middle" dominant-baseline="central">?</text>
      <rect x="44" y="132" width="44" height="44" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1" rx="3"/><text x="66" y="159" class="ps">♜</text>
      <rect x="88" y="132" width="44" height="44" class="cd" rx="3"/><text x="110" y="159" class="ps">♜</text>
      <rect x="132" y="132" width="44" height="44" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1" rx="3"/><text x="154" y="159" class="ps">♜</text>
      <rect x="176" y="132" width="44" height="44" fill="#120812" stroke="#555" stroke-width="1" stroke-dasharray="3,3" rx="3"/><text x="198" y="159" fill="#555" font-size="20" text-anchor="middle" dominant-baseline="central">?</text>
      <rect x="0" y="176" width="44" height="44" fill="#120812" stroke="#555" stroke-width="1" stroke-dasharray="3,3" rx="3"/><text x="22" y="203" fill="#555" font-size="20" text-anchor="middle" dominant-baseline="central">?</text>
      <rect x="44" y="176" width="44" height="44" fill="#120812" stroke="#555" stroke-width="1" stroke-dasharray="3,3" rx="3"/><text x="66" y="203" fill="#555" font-size="20" text-anchor="middle" dominant-baseline="central">?</text>
      <rect x="88" y="176" width="44" height="44" class="cl" rx="3"/><text x="110" y="203" class="pw">♞</text>
