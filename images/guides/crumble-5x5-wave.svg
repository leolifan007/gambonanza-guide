      <rect x="44" y="0" width="44" height="44" class="cl" rx="3"/><text x="66" y="27" class="pb">♟</text>
      <rect x="88" y="0" width="44" height="44" class="cl" rx="3"/><text x="110" y="27" class="pw">♞</text>
      <rect x="132" y="0" width="44" height="44" class="cl" rx="3"/><text x="154" y="27" class="pb">♟</text>
