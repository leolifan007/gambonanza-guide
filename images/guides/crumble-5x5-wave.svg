    <g transform="translate(0,22)">
      <rect x="0" y="0" width="44" height="44" class="cl" rx="3"/><text x="22" y="27" class="pb">♟</text>
      <rect x="44" y="0" width="44" height="44" class="cd" rx="3"/><text x="66" y="27" class="pw">♚</text>
      <rect x="88" y="0" width="44" height="44" class="cl" rx="3"/><text x="110" y="27" class="pw">♞</text>
      <rect x="132" y="0" width="44" height="44" class="cd" rx="3"/><text x="154" y="27" class="pw">♚</text>
      <rect x="176" y="0" width="44" height="44" class="cl" rx="3"/><text x="198" y="27" class="pb">♟</text>
      <rect x="0" y="44" width="44" height="44" class="cd" rx="3"/><text x="22" y="71" class="pw">♚</text>
      <rect x="44" y="44" width="44" height="44" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1" rx="3"/><text x="66" y="71" class="ps">♜</text>
      <rect x="88" y="44" width="44" height="44" class="cd" rx="3"/><text x="110" y="71" class="ps">♜</text>
      <rect x="132" y="44" width="44" height="44" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1" rx="3"/><text x="154" y="71" class="ps">♜</text>
