<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" width="100%" height="auto" style="max-width:800px;display:block;margin:0 auto" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>
    <filter id="g"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/></filter>
    <style>
      .bg{fill:#120812}.cl{fill:#2A1420}.cd{fill:#1C0A14}.hl{fill:#142E1A}
      .pw{font:24px 'Segoe UI',monospace;text-anchor:middle;dominant-baseline:central;filter:url(#s);fill:#F0E0CC}
      .pb{font:24px 'Segoe UI',monospace;text-anchor:middle;dominant-baseline:central;filter:url(#s);fill:#D44030}
      .ps{font:24px 'Segoe UI',monospace;text-anchor:middle;dominant-baseline:central;filter:url(#s);fill:#F0C040}
      .tl{font:13px Tahoma,sans-serif;fill:#C09050;font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="800" height="340" rx="10" filter="url(#g)"/>

  <!-- Wave 1: Turns 3-4 (Corners) -->
  <g transform="translate(15,15)">
