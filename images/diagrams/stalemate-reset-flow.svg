<svg xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif" width="700" height="320" viewBox="0 0 700 320">
<rect width="700" height="320" fill="#1A0F1A" rx="12"/>
<text x="350" y="38" fill="#D4A84A" font-family="'VT323',monospace" font-size="22" text-anchor="middle">Stalemate Reset Flow</text>

<!-- BEFORE block -->
<rect x="40" y="60" width="280" height="60" rx="8" fill="#2D1A2D" stroke="#A85D6A" stroke-width="1.5"/>
<text x="180" y="82" fill="#A85D6A" font-family="'VT323',monospace" font-size="14" text-anchor="middle">BEFORE v1.3</text>
<text x="180" y="105" fill="#E8D5C0" font-size="12" text-anchor="middle">Stalemate counter: Stage 1 (3) &rarr; Stage 2 (6) &rarr; Stage 3 (9)</text>

<!-- Arrow -->
<line x1="320" y1="90" x2="370" y2="90" stroke="#D4A84A" stroke-width="2"/>
<polygon points="365,85 375,90 365,95" fill="#D4A84A"/>

<!-- AFTER block -->
<rect x="380" y="60" width="280" height="60" rx="8" fill="#2D1A2D" stroke="#5CB85C" stroke-width="1.5"/>
<text x="520" y="82" fill="#5CB85C" font-family="'VT323',monospace" font-size="14" text-anchor="middle">AFTER v1.3</text>
<text x="520" y="105" fill="#E8D5C0" font-size="12" text-anchor="middle">Counter: Stage 1 (3) &rarr; [BOSS RESET] &rarr; Stage 2 (0)</text>

<!-- Detail flow -->
<rect x="40" y="145" width="620" height="20" rx="4" fill="#3A2030"/>
<text x="350" y="159" fill="#D4A84A" font-family="'VT323',monospace" font-size="12" text-anchor="middle">Battle Flow Comparison</text>

<!-- Three states -->
<rect x="40" y="180" width="140" height="45" rx="6" fill="#2D1A2D" stroke="#5CB85C" stroke-width="1.5"/>
<text x="110" y="200" fill="#5CB85C" font-size="12" text-anchor="middle">Regular Stage</text>
<text x="110" y="216" fill="#E8D5C0" font-size="11" text-anchor="middle">Stalemate builds</text>

<line x1="180" y1="202" x2="215" y2="202" stroke="#D4A84A" stroke-width="1.5"/>
<polygon points="210,197 220,202 210,207" fill="#D4A84A"/>

<rect x="225" y="180" width="140" height="45" rx="6" fill="#2D1A2D" stroke="#A85D6A" stroke-width="1.5"/>
<text x="295" y="200" fill="#A85D6A" font-size="12" text-anchor="middle">Boss Fight</text>
<text x="295" y="216" fill="#E8D5C0" font-size="11" text-anchor="middle">Counter peaks</text>

<line x1="365" y1="202" x2="400" y2="202" stroke="#5CB85C" stroke-width="1.5"/>
<polygon points="395,197 405,202 395,207" fill="#5CB85C"/>

<rect x="410" y="180" width="140" height="45" rx="6" fill="#2D1A2D" stroke="#5CB85C" stroke-width="1.5"/>
<text x="480" y="200" fill="#5CB85C" font-size="12" text-anchor="middle">Counter RESET</text>
<text x="480" y="216" fill="#E8D5C0" font-size="11" text-anchor="middle">Back to 0</text>

<line x1="550" y1="202" x2="585" y2="202" stroke="#E8D5C0" stroke-width="1" stroke-dasharray="3,3"/>
<rect x="590" y="180" width="70" height="45" rx="6" fill="#2D1A2D" stroke="#E8D5C0" stroke-width="1"/>
<text x="625" y="200" fill="#E8D5C0" font-size="11" text-anchor="middle">Repeat</text>
<text x="625" y="215" fill="#E8D5C0" font-size="11" text-anchor="middle">Stage N</text>

<!-- Key insight box -->
<rect x="40" y="245" width="620" height="50" rx="6" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5"/>
<text x="350" y="267" fill="#D4A84A" font-family="'VT323',monospace" font-size="13" text-anchor="middle">KEY INSIGHT</text>
<text x="350" y="284" fill="#E8D5C0" font-size="12" text-anchor="middle">Before: Counter carried over stages indefinitely. After: Win a boss fight = full reset. Play aggressively near bosses.</text>
</svg>
