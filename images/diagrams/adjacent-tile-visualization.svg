<!-- Legend -->
<rect x="40" y="295" width="520" height="50" rx="6" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1"/>
<rect x="60" y="308" width="14" height="14" rx="3" fill="none" stroke="#5CB85C" stroke-width="2"/>
<text x="80" y="320" fill="#5CB85C" font-size="12">ADJACENT = triggers Gambit (orthogonal)</text>
<rect x="320" y="308" width="14" height="14" rx="3" fill="none" stroke="#A85D6A" stroke-width="2"/>
<text x="340" y="320" fill="#A85D6A" font-size="12">Diagonal = NO trigger</text>
<text x="250" y="338" fill="#E8D5C0" font-size="11" text-anchor="middle">PIECE * = Your Gambit piece. 4 adjacent tiles total.</text>
