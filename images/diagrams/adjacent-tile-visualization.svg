<svg xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif" width="600" height="360" viewBox="0 0 600 360">
<rect width="600" height="360" fill="#1A0F1A" rx="12"/>
<text x="300" y="38" fill="#D4A84A" font-family="'VT323',monospace" font-size="22" text-anchor="middle">ADJACENT Tile Reference</text>

