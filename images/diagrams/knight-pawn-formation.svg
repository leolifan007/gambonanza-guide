<svg xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif" width="600" height="380" viewBox="0 0 600 380">
<rect width="600" height="380" fill="#1A0F1A" rx="12"/>
<text x="300" y="38" fill="#D4A84A" font-family="'VT323',monospace" font-size="22" text-anchor="middle">Knight + Pawn Formation</text>

<!-- Board 7x7 -->
<rect x="30" y="55" width="540" height="310" rx="4" fill="#2D1A2D" stroke="#4A9B9B" stroke-width="0.5"/>

<!-- Grid lines 7x7 -->
<g stroke="#3A2030" stroke-width="0.5">
<line x1="108" y1="55" x2="108" y2="365"/>
<line x1="186" y1="55" x2="186" y2="365"/>
<line x1="264" y1="55" x2="264" y2="365"/>
<line x1="342" y1="55" x2="342" y2="365"/>
<line x1="420" y1="55" x2="420" y2="365"/>
<line x1="498" y1="55" x2="498" y2="365"/>
<line x1="30" y1="99" x2="570" y2="99"/>
<line x1="30" y1="143" x2="570" y2="143"/>
<line x1="30" y1="187" x2="570" y2="187"/>
<line x1="30" y1="231" x2="570" y2="231"/>
<line x1="30" y1="275" x2="570" y2="275"/>
<line x1="30" y1="319" x2="570" y2="319"/>
</g>

<!-- PAWN wall (blue) - bottom row -->
<text x="70" y="345" fill="#4A9B9B" font-size="16" text-anchor="middle">&#9823;</text>
<text x="148" y="345" fill="#4A9B9B" font-size="16" text-anchor="middle">&#9823;</text>
<text x="226" y="345" fill="#4A9B9B" font-size="16" text-anchor="middle">&#9823;</text>
<text x="304" y="345" fill="#4A9B9B" font-size="16" text-anchor="middle">&#9823;</text>
<text x="382" y="345" fill="#4A9B9B" font-size="16" text-anchor="middle">&#9823;</text>
<text x="460" y="345" fill="#4A9B9B" font-size="16" text-anchor="middle">&#9823;</text>

<!-- KNIGHT cluster (purple) -->
<text x="70" y="257" fill="#A85D6A" font-size="16" text-anchor="middle">&#9822;</text>
<text x="148" y="257" fill="#A85D6A" font-size="16" text-anchor="middle">&#9822;</text>
<text x="226" y="257" fill="#A85D6A" font-size="16" text-anchor="middle">&#9822;</text>
<text x="304" y="257" fill="#A85D6A" font-size="16" text-anchor="middle">&#9822;</text>
<text x="382" y="257" fill="#A85D6A" font-size="16" text-anchor="middle">&#9822;</text>

<!-- E = Excalibur piece -->
<text x="460" y="257" fill="#D4A84A" font-size="14" text-anchor="middle">&#9822;</text>
<rect x="450" y="246" width="22" height="22" rx="3" fill="none" stroke="#D4A84A" stroke-width="1.5"/>

<!-- Promoted Rook + Bishop -->
<text x="148" y="169" fill="#D4764A" font-size="16" text-anchor="middle">&#9820;</text>
<text x="304" y="169" fill="#D4764A" font-size="16" text-anchor="middle">&#9820;</text>
<text x="226" y="169" fill="#5CB85C" font-size="16" text-anchor="middle">&#9821;</text>
<text x="382" y="169" fill="#5CB85C" font-size="16" text-anchor="middle">&#9821;</text>

<!-- Queen pushes the line -->
<text x="304" y="81" fill="#D4A84A" font-size="16" text-anchor="middle">&#9819;</text>

<!-- Arrow from mid to bottom -->
<path d="M350 319 L350 325" stroke="#D4A84A" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-gold)"/>
<path d="M350 275 L350 281" stroke="#D4A84A" stroke-width="1" stroke-dasharray="3,3"/>

<!-- Labels on the right -->
<text x="510" y="345" fill="#4A9B9B" font-size="12">PAWN Wall</text>
<text x="510" y="261" fill="#A85D6A" font-size="12">Knights</text>
<text x="510" y="173" fill="#D4764A" font-size="12">Promoted</text>
<text x="510" y="85" fill="#D4A84A" font-size="12">Queen Push</text>
</svg>
