<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.6"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C09050"/>
    </marker>
  </defs>

  <rect width="440" height="220" rx="10" fill="#120812" filter="url(#s)"/>

  <text x="220" y="30" text-anchor="middle" fill="#E0D0C0" font-size="14" font-weight="bold">⚔ Center Lock Strategy</text>

  <!-- Step 1 -->
  <g transform="translate(18,48)">
    <rect width="404" height="44" rx="6" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5"/>
    <text x="24" y="28" fill="#F0E0CC" font-size="20" filter="url(#s)">♞</text>
    <text x="52" y="28" fill="#E0D0C0" font-size="13">Turn 1: Knight → center</text>
    <text x="390" y="16" text-anchor="end" fill="#F0C040" font-size="10">S-tier tile</text>
  </g>

  <!-- Arrow -->
  <line x1="220" y1="92" x2="220" y2="104" stroke="#C09050" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <g transform="translate(18,108)">
    <rect width="404" height="44" rx="6" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5"/>
    <text x="24" y="28" fill="#F0E0CC" font-size="20" filter="url(#s)">♝♜</text>
    <text x="62" y="28" fill="#E0D0C0" font-size="13">Turn 2: Bishop/Rook → reinforce center</text>
    <text x="390" y="16" text-anchor="end" fill="#C09050" font-size="10">A-tier tiles</text>
  </g>

  <!-- Arrow -->
  <line x1="220" y1="152" x2="220" y2="164" stroke="#C09050" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <g transform="translate(18,168)">
    <rect width="404" height="44" rx="6" fill="#142E1A" stroke="#4CAF50" stroke-width="2"/>
    <text x="24" y="28" fill="#81C784" font-size="20" filter="url(#s)">🏰</text>
    <text x="52" y="28" fill="#E0D0C0" font-size="13">Turn 3: Fortress Gambit on center piece</text>
    <text x="390" y="16" text-anchor="end" fill="#81C784" font-size="10">Tile locked ✓</text>
  </g>
</svg>