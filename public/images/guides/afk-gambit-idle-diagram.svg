<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="100%" height="auto" style="max-width:720px;display:block;margin:0 auto" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>
    <filter id="g"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C09050"/>
    </marker>
  </defs>
  <rect width="720" height="200" rx="10" fill="#120812" filter="url(#g)"/>
  <text x="360" y="26" text-anchor="middle" fill="#E0D0C0" font-size="14" font-weight="bold" filter="url(#s)">💤 Afk Gambit: The 3:2 Idle Ratio</text>
  
  <!-- Column 1: Workers (Move every turn) -->
  <g transform="translate(14,36)">
    <rect width="165" height="130" rx="6" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5"/>
    <rect width="165" height="28" rx="6" fill="#2A1420"/>
    <text x="82" y="20" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold" filter="url(#s)">WORKERS (Move)</text>
    <text x="42" y="68" text-anchor="middle" fill="#F0E0CC" font-size="22" filter="url(#s)">♞</text>
    <text x="42" y="92" text-anchor="middle" fill="#C08870" font-size="10">Knight</text>
    <text x="125" y="68" text-anchor="middle" fill="#F0E0CC" font-size="22" filter="url(#s)">♝</text>
    <text x="125" y="92" text-anchor="middle" fill="#C08870" font-size="10">Bishop</text>
    <text x="82" y="118" text-anchor="middle" fill="#C08870" font-size="10">⇄ Contest board</text>
    <text x="82" y="145" text-anchor="middle" fill="#C09050" font-size="9">2-3 pieces</text>
  </g>
  <!-- Arrow -->
  <line x1="184" y1="100" x2="206" y2="100" stroke="#C09050" stroke-width="2.5" marker-end="url(#arr)"/>
  
  <!-- Column 2: Idlers (Stay still) -->
  <g transform="translate(210,36)">
    <rect width="165" height="130" rx="6" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5"/>
    <rect width="165" height="28" rx="6" fill="#3A1A10"/>
    <text x="82" y="20" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold" filter="url(#s)">IDLERS (Still)</text>
    <text x="42" y="68" text-anchor="middle" fill="#F0C040" font-size="22" filter="url(#s)">♜</text>
    <text x="42" y="92" text-anchor="middle" fill="#C08870" font-size="10">Rook</text>
    <text x="125" y="68" text-anchor="middle" fill="#F0C040" font-size="22" filter="url(#s)">♚</text>
    <text x="125" y="92" text-anchor="middle" fill="#C08870" font-size="10">King</text>
    <text x="82" y="118" text-anchor="middle" fill="#C08870" font-size="10">💤 Generate stock</text>
    <text x="82" y="145" text-anchor="middle" fill="#C09050" font-size="9">3-4 pieces</text>
  </g>
  <!-- Arrow -->
  <line x1="380" y1="100" x2="402" y2="100" stroke="#C09050" stroke-width="2.5" marker-end="url(#arr)"/>
  
  <!-- Column 3: Support Gambits -->
  <g transform="translate(406,36)">
    <rect width="165" height="130" rx="6" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5"/>
    <rect width="165" height="28" rx="6" fill="#1A2A14"/>
    <text x="82" y="20" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold" filter="url(#s)">SUPPORT GAMBITS</text>
    <text x="82" y="54" text-anchor="middle" fill="#81C784" font-size="11">🏰 Fortress</text>
    <text x="82" y="73" text-anchor="middle" fill="#81C784" font-size="11">📦 Stockpiler</text>
    <text x="82" y="92" text-anchor="middle" fill="#81C784" font-size="11">🌊 Still Waters</text>
    <text x="82" y="111" text-anchor="middle" fill="#81C784" font-size="11">🛡️ Stand Ground</text>
    <text x="82" y="145" text-anchor="middle" fill="#C09050" font-size="9">Pick 2-3 minimum</text>
  </g>
  <!-- Arrow -->
  <line x1="576" y1="100" x2="598" y2="100" stroke="#C09050" stroke-width="2.5" marker-end="url(#arr)"/>
  
  <!-- Column 4: Result -->
  <g transform="translate(602,36)">
    <rect width="105" height="130" rx="6" fill="#142E1A" stroke="#4CAF50" stroke-width="2" filter="url(#g)"/>
    <rect width="105" height="28" rx="6" fill="#0E2A12"/>
    <text x="52" y="20" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold" filter="url(#s)">RESULT</text>
    <text x="52" y="65" text-anchor="middle" fill="#81C784" font-size="22" font-weight="bold" filter="url(#g)">+25</text>
    <text x="52" y="88" text-anchor="middle" fill="#4CAF50" font-size="11">Stock/turn</text>
    <text x="52" y="112" text-anchor="middle" fill="#81C784" font-size="11">💰 💰 💰</text>
    <text x="52" y="138" text-anchor="middle" fill="#81C784" font-size="9">by Turn 12</text>
  </g>
</svg>