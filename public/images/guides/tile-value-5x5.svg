<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <filter id="g"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/></filter>
  </defs>

  <rect width="340" height="340" rx="10" fill="#120812" filter="url(#g)"/>
  <text x="170" y="24" text-anchor="middle" fill="#E0D0C0" font-size="13" font-weight="bold">5×5 Tile Value Map</text>

  <!-- 5x5 grid - chessboard tile style -->
  <g transform="translate(45,35)">
    <!-- Row 0: D C B C D -->
    <rect x="0"   y="0"   width="50" height="50" fill="#2A1420" stroke="#D44030" stroke-width="2" rx="3"/><text x="25" y="32" text-anchor="middle" fill="#D44030" font-size="20" font-weight="bold" filter="url(#g)">D</text>
    <rect x="50"  y="0"   width="50" height="50" fill="#1C0A14" stroke="#C08870" stroke-width="1" rx="3"/><text x="75" y="32" text-anchor="middle" fill="#C08870" font-size="20">C</text>
    <rect x="100" y="0"   width="50" height="50" fill="#2A1420" stroke="#C08870" stroke-width="1" rx="3"/><text x="125" y="32" text-anchor="middle" fill="#C08870" font-size="20">B</text>
    <rect x="150" y="0"   width="50" height="50" fill="#1C0A14" stroke="#C08870" stroke-width="1" rx="3"/><text x="175" y="32" text-anchor="middle" fill="#C08870" font-size="20">C</text>
    <rect x="200" y="0"   width="50" height="50" fill="#2A1420" stroke="#D44030" stroke-width="2" rx="3"/><text x="225" y="32" text-anchor="middle" fill="#D44030" font-size="20" font-weight="bold" filter="url(#g)">D</text>

    <!-- Row 1: C A A A C -->
    <rect x="0"   y="50"  width="50" height="50" fill="#1C0A14" stroke="#C08870" stroke-width="1" rx="3"/><text x="25" y="82" text-anchor="middle" fill="#C08870" font-size="20">C</text>
    <rect x="50"  y="50"  width="50" height="50" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5" rx="3"/><text x="75" y="82" text-anchor="middle" fill="#D4A84A" font-size="20" filter="url(#g)">A</text>
    <rect x="100" y="50"  width="50" height="50" fill="#1C0A14" stroke="#D4A84A" stroke-width="1.5" rx="3"/><text x="125" y="82" text-anchor="middle" fill="#D4A84A" font-size="20" filter="url(#g)">A</text>
    <rect x="150" y="50"  width="50" height="50" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5" rx="3"/><text x="175" y="82" text-anchor="middle" fill="#D4A84A" font-size="20" filter="url(#g)">A</text>
    <rect x="200" y="50"  width="50" height="50" fill="#1C0A14" stroke="#C08870" stroke-width="1" rx="3"/><text x="225" y="82" text-anchor="middle" fill="#C08870" font-size="20">C</text>

    <!-- Row 2: B A S A B -->
    <rect x="0"   y="100" width="50" height="50" fill="#2A1420" stroke="#C08870" stroke-width="1" rx="3"/><text x="25" y="132" text-anchor="middle" fill="#C08870" font-size="20">B</text>
    <rect x="50"  y="100" width="50" height="50" fill="#1C0A14" stroke="#D4A84A" stroke-width="1.5" rx="3"/><text x="75" y="132" text-anchor="middle" fill="#D4A84A" font-size="20" filter="url(#g)">A</text>
    <rect x="100" y="100" width="50" height="50" fill="#142E1A" stroke="#4CAF50" stroke-width="2.5" rx="3" filter="url(#g)"><animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/></rect><text x="125" y="132" text-anchor="middle" fill="#81C784" font-size="22" font-weight="bold" filter="url(#g)">S</text>
    <rect x="150" y="100" width="50" height="50" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5" rx="3"/><text x="175" y="132" text-anchor="middle" fill="#D4A84A" font-size="20" filter="url(#g)">A</text>
    <rect x="200" y="100" width="50" height="50" fill="#1C0A14" stroke="#C08870" stroke-width="1" rx="3"/><text x="225" y="132" text-anchor="middle" fill="#C08870" font-size="20">B</text>

    <!-- Row 3: C A A A C -->
    <rect x="0"   y="150" width="50" height="50" fill="#1C0A14" stroke="#C08870" stroke-width="1" rx="3"/><text x="25" y="182" text-anchor="middle" fill="#C08870" font-size="20">C</text>
    <rect x="50"  y="150" width="50" height="50" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5" rx="3"/><text x="75" y="182" text-anchor="middle" fill="#D4A84A" font-size="20" filter="url(#g)">A</text>
    <rect x="100" y="150" width="50" height="50" fill="#1C0A14" stroke="#D4A84A" stroke-width="1.5" rx="3"/><text x="125" y="182" text-anchor="middle" fill="#D4A84A" font-size="20" filter="url(#g)">A</text>
    <rect x="150" y="150" width="50" height="50" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5" rx="3"/><text x="175" y="182" text-anchor="middle" fill="#D4A84A" font-size="20" filter="url(#g)">A</text>
    <rect x="200" y="150" width="50" height="50" fill="#1C0A14" stroke="#C08870" stroke-width="1" rx="3"/><text x="225" y="182" text-anchor="middle" fill="#C08870" font-size="20">C</text>

    <!-- Row 4: D C B C D -->
    <rect x="0"   y="200" width="50" height="50" fill="#2A1420" stroke="#D44030" stroke-width="2" rx="3"/><text x="25" y="232" text-anchor="middle" fill="#D44030" font-size="20" font-weight="bold" filter="url(#g)">D</text>
    <rect x="50"  y="200" width="50" height="50" fill="#1C0A14" stroke="#C08870" stroke-width="1" rx="3"/><text x="75" y="232" text-anchor="middle" fill="#C08870" font-size="20">C</text>
    <rect x="100" y="200" width="50" height="50" fill="#2A1420" stroke="#C08870" stroke-width="1" rx="3"/><text x="125" y="232" text-anchor="middle" fill="#C08870" font-size="20">B</text>
    <rect x="150" y="200" width="50" height="50" fill="#1C0A14" stroke="#C08870" stroke-width="1" rx="3"/><text x="175" y="232" text-anchor="middle" fill="#C08870" font-size="20">C</text>
    <rect x="200" y="200" width="50" height="50" fill="#2A1420" stroke="#D44030" stroke-width="2" rx="3"/><text x="225" y="232" text-anchor="middle" fill="#D44030" font-size="20" font-weight="bold" filter="url(#g)">D</text>
  </g>

  <!-- Legend -->
  <g transform="translate(45,300)">
    <rect x="0" y="0" width="14" height="14" fill="#142E1A" stroke="#4CAF50" stroke-width="1.5" rx="2"/><text x="20" y="12" fill="#81C784" font-size="11" font-weight="bold">S Supreme</text>
    <rect x="95" y="0" width="14" height="14" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1" rx="2"/><text x="115" y="12" fill="#D4A84A" font-size="11">A Anchor</text>
    <rect x="180" y="0" width="14" height="14" fill="#1C0A14" stroke="#C08870" stroke-width="1" rx="2"/><text x="200" y="12" fill="#C08870" font-size="11">B Bridge</text>
  </g>
</svg>