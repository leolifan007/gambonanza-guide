<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="'Segoe UI','Inter',sans-serif">  <defs>    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>    <filter id="g"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/></filter>    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">      <polygon points="0 0, 10 3.5, 0 7" fill="#C09050"/>    </marker>  </defs>  <rect width="680" height="520" rx="10" fill="#120812" filter="url(#g)"/>  <!-- Phase 1 Header -->  <rect x="30" y="20" width="620" height="34" rx="6" fill="#A85D6A" filter="url(#s)"/>  <text x="50" y="42" fill="#FFF" font-size="14" font-weight="bold">PHASE 1: SETUP</text>  <text x="610" y="42" fill="#E0D0C0" font-size="12" text-anchor="end">Turns 1-3</text>  <!-- Phase 1 Steps -->  <g transform="translate(50,75)">    <rect width="280" height="44" rx="6" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5" filter="url(#s)"/>    <text x="14" y="28" fill="#F0E0CC" font-size="18" filter="url(#s)">?</text>    <text x="40" y="28" fill="#E0D0C0" font-size="13">Deploy Knight to center</text>  </g>  <line x1="190" y1="119" x2="190" y2="130" stroke="#C09050" stroke-width="2" marker-end="url(#arr)"/>  <g transform="translate(50,135)">    <rect width="280" height="44" rx="6" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5" filter="url(#s)"/>    <text x="14" y="28" fill="#F0E0CC" font-size="18" filter="url(#s)">?</text>    <text x="40" y="28" fill="#E0D0C0" font-size="13">Develop 2nd piece (Bishop/Rook)</text>  </g>  <line x1="190" y1="179" x2="190" y2="190" stroke="#C09050" stroke-width="2" marker-end="url(#arr)"/>  <g transform="translate(50,195)">    <rect width="280" height="44" rx="6" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5" filter="url(#s)"/>    <text x="14" y="28" fill="#F0E0CC" font-size="18" filter="url(#s)">?</text>    <text x="40" y="28" fill="#E0D0C0" font-size="13">Play Freeze / Early Check</text>  </g>  <!-- Phase 1 Goal -->  <g transform="translate(370,120)">    <rect width="270" height="50" rx="6" fill="#120812" stroke="#D4A84A" stroke-width="1.5" stroke-dasharray="5,3"/>    <text x="135" y="22" text-anchor="middle" fill="#C09050" font-size="11" font-weight="bold">?? GOAL</text>    <text x="135" y="40" text-anchor="middle" fill="#C08870" font-size="12">Force ˇÝ1 wasted action</text>  </g>  <!-- Arrow between phases -->  <line x1="190" y1="244" x2="190" y2="266" stroke="#C09050" stroke-width="3" marker-end="url(#arr)"/>  <!-- Phase 2 Header -->  <rect x="30" y="270" width="620" height="34" rx="6" fill="#D4764A" filter="url(#s)"/>  <text x="50" y="292" fill="#FFF" font-size="14" font-weight="bold">PHASE 2: PRESSURE</text>  <text x="610" y="292" fill="#E0D0C0" font-size="12" text-anchor="end">Turns 4-6</text>  <!-- Phase 2 Steps -->  <g transform="translate(50,325)">    <rect width="280" height="44" rx="6" fill="#2D1A2D" stroke="#F0C040" stroke-width="1.5" filter="url(#s)"/>    <text x="14" y="28" fill="#F0C040" font-size="18" filter="url(#s)">?</text>    <text x="40" y="28" fill="#E0D0C0" font-size="13">Knight fork (threaten 2)</text>  </g>  <line x1="190" y1="369" x2="190" y2="380" stroke="#C09050" stroke-width="2" marker-end="url(#arr)"/>  <g transform="translate(50,385)">    <rect width="280" height="44" rx="6" fill="#2D1A2D" stroke="#F0C040" stroke-width="1.5" filter="url(#s)"/>    <text x="14" y="28" fill="#F0C040" font-size="18" filter="url(#s)">?</text>    <text x="40" y="28" fill="#E0D0C0" font-size="13">Deploy Queen if available</text>  </g>  <!-- Phase 2 Goal -->  <g transform="translate(370,330)">    <rect width="270" height="50" rx="6" fill="#120812" stroke="#F0C040" stroke-width="1.5" stroke-dasharray="5,3"/>    <text x="135" y="22" text-anchor="middle" fill="#F0C040" font-size="11" font-weight="bold">?? GOAL</text>    <text x="135" y="40" text-anchor="middle" fill="#C08870" font-size="12">Insurmountable material advantage</text>  </g>  <!-- Arrow between phases -->  <line x1="190" y1="434" x2="190" y2="446" stroke="#C09050" stroke-width="3" marker-end="url(#arr)"/>  <!-- Phase 3 Header -->  <rect x="30" y="450" width="620" height="34" rx="6" fill="#2E7D32" filter="url(#g)"/>  <text x="50" y="472" fill="#FFF" font-size="14" font-weight="bold">PHASE 3: CLOSE</text>  <text x="610" y="472" fill="#81C784" font-size="12" text-anchor="end">Turn 7+</text>  <!-- Phase 3 inline -->  <g transform="translate(50,492)">    <text x="0" y="14" fill="#81C784" font-size="13" font-weight="bold">Check King every turn ˇú Each check = 1 wasted Blitzking action ˇú Checkmate</text>  </g></svg>