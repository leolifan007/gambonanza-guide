<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e6a817"/>
    </marker>
  </defs>

  <rect width="480" height="280" rx="12" fill="url(#bg)"/>

  <!-- Title -->
  <text x="240" y="30" text-anchor="middle" fill="#e6a817" font-size="15" font-weight="bold">🏥 Heal Board Loop</text>

  <!-- Center loop: 4 nodes in a circle -->
  <!-- Node 1: Tile collapses (top) -->
  <g transform="translate(170,50)">
    <rect width="140" height="50" rx="10" fill="#2a1a1a" stroke="#ef5350" stroke-width="2"/>
    <text x="70" y="22" text-anchor="middle" fill="#ef5350" font-size="20">💥</text>
    <text x="70" y="42" text-anchor="middle" fill="#f5f5f5" font-size="12">Tile Collapses</text>
  </g>

  <!-- Node 2: Play Heal Board (right) -->
  <g transform="translate(310,110)">
    <rect width="140" height="50" rx="10" fill="#0f3460" stroke="#42a5f5" stroke-width="2"/>
    <text x="70" y="22" text-anchor="middle" fill="#42a5f5" font-size="20">🏥</text>
    <text x="70" y="42" text-anchor="middle" fill="#f5f5f5" font-size="12">Play Heal Board</text>
  </g>

  <!-- Node 3: Tile restored + Gambit (bottom) -->
  <g transform="translate(170,170)">
    <rect width="140" height="50" rx="10" fill="#1b3a1b" stroke="#4caf50" stroke-width="2"/>
    <text x="70" y="22" text-anchor="middle" fill="#4caf50" font-size="20">✨</text>
    <text x="70" y="42" text-anchor="middle" fill="#f5f5f5" font-size="12">Tile + Gambit Restored</text>
  </g>

  <!-- Node 4: Trigger Free Gambit (left) -->
  <g transform="translate(30,110)">
    <rect width="140" height="50" rx="10" fill="#1a0d3a" stroke="#ab47bc" stroke-width="2"/>
    <text x="70" y="22" text-anchor="middle" fill="#ab47bc" font-size="20">⚡</text>
    <text x="70" y="42" text-anchor="middle" fill="#f5f5f5" font-size="12">Trigger Free Gambit</text>
  </g>

  <!-- Arrows forming the loop -->
  <!-- 1 → 2 (top-right) -->
  <path d="M 310,100 Q 340,80 340,110" fill="none" stroke="#e6a817" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- 2 → 3 (right-bottom) -->
  <path d="M 380,160 Q 350,190 310,195" fill="none" stroke="#e6a817" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- 3 → 4 (bottom-left) -->
  <path d="M 170,195 Q 140,190 140,160" fill="none" stroke="#e6a817" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- 4 → 1 (left-top) -->
  <path d="M 100,110 Q 120,80 170,75" fill="none" stroke="#e6a817" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Center label -->
  <g transform="translate(190,120)">
    <text x="50" y="0" text-anchor="middle" fill="#e6a817" font-size="14" font-weight="bold">+8-12</text>
    <text x="50" y="18" text-anchor="middle" fill="#a0a0c0" font-size="10">stock per loop</text>
  </g>

  <!-- Bottom note -->
  <text x="240" y="262" text-anchor="middle" fill="#81c784" font-size="11">Heal Board restores tiles WITH their Gambit properties → farm Free Gambit tiles forever</text>
</svg>