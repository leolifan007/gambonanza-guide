<rect x="350" y="400" width="320" height="28" rx="4" fill="#3A2030" stroke="#D4A84A" stroke-width="1"/>
<text x="510" y="418" fill="#D4A84A" font-family="'VT323',monospace" font-size="12" text-anchor="middle">King: Stage 6 True Final Boss after Grandmaster</text>
