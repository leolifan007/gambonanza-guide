<svg xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif" width="700" height="380" viewBox="0 0 700 380">
<rect width="700" height="380" fill="#1A0F1A" rx="12"/>
<text x="350" y="35" fill="#D4A84A" font-family="'VT323',monospace" font-size="22" text-anchor="middle">Queen vs King - Hidden Scaling Changes</text>

<rect x="50" y="60" width="180" height="28" rx="4" fill="#2D1A2D" stroke="#4A9B9B" stroke-width="1"/>
<text x="140" y="79" fill="#4A9B9B" font-family="'VT323',monospace" font-size="13" text-anchor="middle">Queen (You Know)</text>

<rect x="470" y="60" width="180" height="28" rx="4" fill="#2D1A2D" stroke="#D4764A" stroke-width="1"/>
<text x="560" y="79" fill="#D4764A" font-family="'VT323',monospace" font-size="13" text-anchor="middle">King (Hidden)</text>

<!-- Row 1: Economy -->
<rect x="30" y="100" width="640" height="55" rx="6" fill="#2D1A2D" stroke="#3A2030" stroke-width="1"/>
<text x="50" y="122" fill="#A85D6A" font-family="'VT323',monospace" font-size="14" text-anchor="start">Economy Scaling</text>
<text x="50" y="142" fill="#E8D5C0" font-size="11" text-anchor="start">Prices normal. Reset = 8 stock.</text>
<text x="370" y="142" fill="#D4764A" font-size="11" text-anchor="start">Shop up 25-40%. Reset = 16 stock. Pay more, earn same.</text>

<line x1="330" y1="105" x2="330" y2="150" stroke="#E8D5C0" stroke-width="0.5" opacity="0.3"/>

<!-- Row 2: Boss HP -->
<rect x="30" y="160" width="640" height="55" rx="6" fill="#2D1A2D" stroke="#3A2030" stroke-width="1"/>
<text x="50" y="182" fill="#A85D6A" font-family="'VT323',monospace" font-size="14" text-anchor="start">Boss HP Multiplier</text>
<text x="50" y="202" fill="#E8D5C0" font-size="11" text-anchor="start">Boss HP +0%. Predictable phase shift.</text>
<text x="370" y="202" fill="#D4764A" font-size="11" text-anchor="start">Boss HP +60-80%. Phase shift threshold -2 turns.</text>

<line x1="330" y1="165" x2="330" y2="210" stroke="#E8D5C0" stroke-width="0.5" opacity="0.3"/>

<!-- Row 3: Crumble Timer -->
<rect x="30" y="220" width="640" height="55" rx="6" fill="#2D1A2D" stroke="#3A2030" stroke-width="1"/>
<text x="50" y="242" fill="#A85D6A" font-family="'VT323',monospace" font-size="14" text-anchor="start">Crumble Timer</text>
<text x="50" y="262" fill="#E8D5C0" font-size="11" text-anchor="start">Standard timer. Predictable collapse.</text>
<text x="370" y="262" fill="#D4764A" font-size="11" text-anchor="start">Timer -40%. Board shrinks 2-3 turns sooner.</text>

<line x1="330" y1="225" x2="330" y2="270" stroke="#E8D5C0" stroke-width="0.5" opacity="0.3"/>

<!-- Row 4: AI Priority -->
<rect x="30" y="280" width="640" height="55" rx="6" fill="#2D1A2D" stroke="#3A2030" stroke-width="1"/>
<text x="50" y="302" fill="#A85D6A" font-family="'VT323',monospace" font-size="14" text-anchor="start">AI Target Priority</text>
<text x="50" y="322" fill="#E8D5C0" font-size="11" text-anchor="start">Random target. Gambit cores survive.</text>
<text x="370" y="322" fill="#D4764A" font-size="11" text-anchor="start">Targets gambit cores. Your engine dies first.</text>

<rect x="100" y="348" width="500" height="24" rx="4" fill="#3A2030" stroke="#D4A84A" stroke-width="1"/>
<text x="350" y="364" fill="#D4A84A" font-family="'VT323',monospace" font-size="12" text-anchor="middle">King is not harder Queen. King is different rules. Adjust or die.</text>
</svg>