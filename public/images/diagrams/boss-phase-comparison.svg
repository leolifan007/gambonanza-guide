<svg xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif" width="700" height="360" viewBox="0 0 700 360">
<rect width="700" height="360" fill="#1A0F1A" rx="12"/>
<text x="350" y="35" fill="#D4A84A" font-family="'VT323',monospace" font-size="22" text-anchor="middle">Final Boss - Phase 1 vs Phase 2</text>

<rect x="50" y="55" width="260" height="30" rx="6" fill="#2D1A2D" stroke="#4A9B9B" stroke-width="1.5"/>
<text x="180" y="75" fill="#4A9B9B" font-family="'VT323',monospace" font-size="14" text-anchor="middle">Phase 1: Standard Fight</text>

<rect x="390" y="55" width="260" height="30" rx="6" fill="#2D1A2D" stroke="#A85D6A" stroke-width="1.5"/>
<text x="520" y="75" fill="#A85D6A" font-family="'VT323',monospace" font-size="14" text-anchor="middle">Phase 2: TRANSFORMATION!</text>

<!-- Trigger -->
<rect x="150" y="100" width="400" height="40" rx="8" fill="#3A2030" stroke="#D4A84A" stroke-width="1.5"/>
<text x="350" y="120" fill="#D4A84A" font-family="'VT323',monospace" font-size="14" text-anchor="middle">TRIGGER: Patience Meter fills by gambit activations</text>
<text x="350" y="136" fill="#E8D5C0" font-size="11" text-anchor="middle">NOT by HP. BOSS watches how many gambits you trigger.</text>

<line x1="50" y1="155" x2="650" y2="155" stroke="#E8D5C0" stroke-width="0.5" opacity="0.3"/>

<!-- Comparison rows -->
<rect x="60" y="165" width="240" height="26" rx="4" fill="#2D1A2D" stroke="#4A9B9B" stroke-width="0.5"/>
<text x="180" y="183" fill="#E8D5C0" font-size="12" text-anchor="middle">Move speed: Normal (1 move/turn)</text>

<rect x="60" y="196" width="240" height="26" rx="4" fill="#2D1A2D" stroke="#4A9B9B" stroke-width="0.5"/>
<text x="180" y="214" fill="#E8D5C0" font-size="12" text-anchor="middle">Effects: Standard debuffs</text>

<rect x="60" y="227" width="240" height="26" rx="4" fill="#2D1A2D" stroke="#4A9B9B" stroke-width="0.5"/>
<text x="180" y="245" fill="#E8D5C0" font-size="12" text-anchor="middle">Survivability: Predictable patterns</text>

<rect x="60" y="258" width="240" height="26" rx="4" fill="#2D1A2D" stroke="#4A9B9B" stroke-width="0.5"/>
<text x="180" y="276" fill="#E8D5C0" font-size="12" text-anchor="middle">Win condition: Outlast</text>

<rect x="400" y="165" width="240" height="26" rx="4" fill="#2D1A2D" stroke="#A85D6A" stroke-width="0.5"/>
<text x="520" y="183" fill="#A85D6A" font-size="12" text-anchor="middle">Move speed: 2x (+teleport)</text>

<rect x="400" y="196" width="240" height="26" rx="4" fill="#2D1A2D" stroke="#A85D6A" stroke-width="0.5"/>
<text x="520" y="214" fill="#E8D5C0" font-size="12" text-anchor="middle">Effects: Clears all non-permanent effects</text>

<rect x="400" y="227" width="240" height="26" rx="4" fill="#2D1A2D" stroke="#A85D6A" stroke-width="0.5"/>
<text x="520" y="245" fill="#E8D5C0" font-size="12" text-anchor="middle">Survivability: AOE attacks, multi-target</text>

<rect x="400" y="258" width="240" height="26" rx="4" fill="#2D1A2D" stroke="#A85D6A" stroke-width="0.5"/>
<text x="520" y="276" fill="#E8D5C0" font-size="12" text-anchor="middle">Win condition: Burst before wipe</text>

<rect x="100" y="300" width="500" height="48" rx="8" fill="#3A2030" stroke="#5CB85C" stroke-width="1"/>
<text x="350" y="318" fill="#5CB85C" font-family="'VT323',monospace" font-size="13" text-anchor="middle">3 Builds That Survive Phase 2</text>
<text x="350" y="338" fill="#F5E6D3" font-size="11" text-anchor="middle">High-tolerance economy | Fast burst | Board control lock</text>
</svg>