<text x="125" y="250" fill="#F5E6D3" font-size="11" text-anchor="middle">Establish position</text>
<text x="125" y="266" fill="#F5E6D3" font-size="11" text-anchor="middle">Do not lose pieces</text>

<text x="235" y="180" fill="#E8D5C0" font-size="20">-></text>

