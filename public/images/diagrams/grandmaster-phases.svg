<text x="575" y="93" fill="#D4A84A" font-family="'VT323',monospace" font-size="16" text-anchor="middle">Phase 3</text>
<text x="575" y="115" fill="#F5E6D3" font-size="13" text-anchor="middle">Grandmaster Desperation</text>
<text x="575" y="140" fill="#E8D5C0" font-size="11" text-anchor="middle">Multiple threats/turn</text>
<text x="575" y="156" fill="#E8D5C0" font-size="11" text-anchor="middle">Sacrifices pieces for</text>
