<text x="350" y="115" fill="#F5E6D3" font-size="13" text-anchor="middle">Grandmaster Aggressive</text>
<text x="350" y="140" fill="#E8D5C0" font-size="11" text-anchor="middle">AI targets key pieces</text>
<text x="350" y="156" fill="#E8D5C0" font-size="11" text-anchor="middle">Increased capture</text>
<text x="350" y="176" fill="#E8D5C0" font-size="11" text-anchor="middle">frequency</text>
<line x1="275" y1="210" x2="425" y2="210" stroke="#A85D6A" stroke-width="0.5" opacity="0.3"/>
<text x="350" y="232" fill="#D4764A" font-size="12" text-anchor="middle">Goal:</text>
<text x="350" y="250" fill="#F5E6D3" font-size="11" text-anchor="middle">SURVIVE</text>
<text x="350" y="266" fill="#E8D5C0" font-size="11" text-anchor="middle">Do not overextend</text>

<text x="460" y="180" fill="#E8D5C0" font-size="20">-></text>

<rect x="480" y="70" width="190" height="220" rx="10" fill="#2D1A2D" stroke="#D4A84A" stroke-width="2"/>
