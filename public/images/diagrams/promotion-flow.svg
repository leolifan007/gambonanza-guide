<svg xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif" width="700" height="380" viewBox="0 0 700 380">
<rect width="700" height="380" fill="#1A0F1A" rx="12"/>
<text x="350" y="35" fill="#D4A84A" font-family="'VT323',monospace" font-size="22" text-anchor="middle">Pawn Promotion - 4 Blockers Diagnostic</text>

<!-- Blocker 1 -->
<rect x="30" y="60" width="150" height="135" rx="8" fill="#2D1A2D" stroke="#4A9B9B" stroke-width="1.5"/>
<rect x="30" y="60" width="150" height="25" rx="8" fill="#4A9B9B" opacity="0.2"/>
<text x="105" y="78" fill="#4A9B9B" font-family="'VT323',monospace" font-size="12" text-anchor="middle">#1</text>
<text x="105" y="100" fill="#F5E6D3" font-size="12" font-weight="bold" text-anchor="middle">Tile Ownership</text>
<text x="105" y="120" fill="#E8D5C0" font-size="10" text-anchor="middle">Pawn at rank 8 but</text>
<text x="105" y="136" fill="#E8D5C0" font-size="10" text-anchor="middle">tile not yours</text>
<text x="105" y="160" fill="#D4764A" font-size="10" text-anchor="middle">Check end-of-turn</text>
<text x="105" y="175" fill="#D4764A" font-size="10" text-anchor="middle">ownership</text>

<arrow x="188" y="130" fill="#E8D5C0" font-size="16">-></arrow>

<!-- Blocker 2 -->
<rect x="200" y="60" width="150" height="135" rx="8" fill="#2D1A2D" stroke="#D4764A" stroke-width="1.5"/>
<rect x="200" y="60" width="150" height="25" rx="8" fill="#D4764A" opacity="0.2"/>
<text x="275" y="78" fill="#D4764A" font-family="'VT323',monospace" font-size="12" text-anchor="middle">#2</text>
<text x="275" y="100" fill="#F5E6D3" font-size="12" font-weight="bold" text-anchor="middle">Gambit Conflict</text>
<text x="275" y="120" fill="#E8D5C0" font-size="10" text-anchor="middle">Gambit absorbs</text>
<text x="275" y="136" fill="#E8D5C0" font-size="10" text-anchor="middle">the promotion event</text>
<text x="275" y="160" fill="#D4764A" font-size="10" text-anchor="middle">Disable gambits</text>
<text x="275" y="175" fill="#D4764A" font-size="10" text-anchor="middle">one at a time</text>

<arrow x="358" y="130" fill="#E8D5C0" font-size="16">-></arrow>

<!-- Blocker 3 -->
<rect x="370" y="60" width="150" height="135" rx="8" fill="#2D1A2D" stroke="#A85D6A" stroke-width="1.5"/>
<rect x="370" y="60" width="150" height="25" rx="8" fill="#A85D6A" opacity="0.2"/>
<text x="445" y="78" fill="#A85D6A" font-family="'VT323',monospace" font-size="12" text-anchor="middle">#3</text>
<text x="445" y="100" fill="#F5E6D3" font-size="12" font-weight="bold" text-anchor="middle">Turn Phase</text>
<text x="445" y="116" fill="#F5E6D3" font-size="12" font-weight="bold" text-anchor="middle">Restriction</text>
<text x="445" y="136" fill="#E8D5C0" font-size="10" text-anchor="middle">Pawn promoted by</text>
<text x="445" y="152" fill="#E8D5C0" font-size="10" text-anchor="middle">gambit not move</text>
<text x="445" y="175" fill="#D4764A" font-size="10" text-anchor="middle">Wait 1 full turn</text>

<arrow x="528" y="130" fill="#E8D5C0" font-size="16">-></arrow>

<!-- Blocker 4 -->
<rect x="540" y="60" width="130" height="135" rx="8" fill="#2D1A2D" stroke="#7A3D4A" stroke-width="1.5"/>
<rect x="540" y="60" width="130" height="25" rx="8" fill="#7A3D4A" opacity="0.2"/>
<text x="605" y="78" fill="#7A3D4A" font-family="'VT323',monospace" font-size="12" text-anchor="middle">#4</text>
<text x="605" y="100" fill="#F5E6D3" font-size="12" font-weight="bold" text-anchor="middle">Piece Count</text>
<text x="605" y="116" fill="#F5E6D3" font-size="12" font-weight="bold" text-anchor="middle">Cap</text>
<text x="605" y="136" fill="#E8D5C0" font-size="10" text-anchor="middle">Max queens on</text>
<text x="605" y="152" fill="#E8D5C0" font-size="10" text-anchor="middle">board reached</text>
<text x="605" y="175" fill="#D4764A" font-size="10" text-anchor="middle">Sacrifice 1 queen</text>

<!-- Diagnosis flow -->
<rect x="100" y="215" width="500" height="55" rx="8" fill="#3A2030" stroke="#D4A84A" stroke-width="1"/>
<text x="350" y="235" fill="#D4A84A" font-family="'VT323',monospace" font-size="14" text-anchor="middle">Diagnosis: 3-Step Check for Any Blocker</text>
<text x="350" y="255" fill="#F5E6D3" font-size="11" text-anchor="middle">1. Replay the turn. 2. Identify when condition happened. 3. Test with one variable changed.</text>

<rect x="100" y="280" width="500" height="28" rx="4" fill="#2D1A2D" stroke="#5CB85C" stroke-width="1"/>
<text x="350" y="298" fill="#5CB85C" font-family="'VT323',monospace" font-size="12" text-anchor="middle">30+ controlled tests on v1.1.0 - All 4 blockers confirmed</text>

<rect x="100" y="315" width="500" height="50" rx="6" fill="#2D1A2D" stroke="#4A9B9B" stroke-width="1"/>
<text x="350" y="335" fill="#4A9B9B" font-family="'VT323',monospace" font-size="13" text-anchor="middle">Still failing after all 4 checks?</text>
<text x="350" y="353" fill="#E8D5C0" font-size="11" text-anchor="middle">Screenshot board + gambit panel. Post to Gambonanza Troubleshooting thread.</text>
</svg>