<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" font-family="system-ui, sans-serif" font-size="12">
  <rect width="520" height="400" fill="#1a1a2e" rx="8"/>
  <text x="260" y="25" text-anchor="middle" fill="#d4af37" font-size="15" font-weight="bold">Tier List Comparison: v1.1.0 vs v1.3.0</text>

  <text x="130" y="50" text-anchor="middle" fill="#f44336" font-size="13" font-weight="bold">v1.1.0 (Old)</text>
  <text x="390" y="50" text-anchor="middle" fill="#4caf50" font-size="13" font-weight="bold">v1.3.0 (Current)</text>

  <line x1="30" y1="58" x2="230" y2="58" stroke="#f44336" stroke-width="1" opacity="0.5"/>
  <line x1="290" y1="58" x2="490" y2="58" stroke="#4caf50" stroke-width="1" opacity="0.5"/>

  <!-- S-Tier -->
  <text x="30" y="82" fill="#d4af37" font-size="12" font-weight="bold">S-TIER</text>
  <rect x="30" y="88" width="200" height="45" rx="4" fill="#3e2723" stroke="#d4af37"/>
  <text x="130" y="105" text-anchor="middle" fill="#d4af37" font-size="10">Teleport | Ultimate Counter | Heal Board</text>
  <text x="130" y="120" text-anchor="middle" fill="#888" font-size="9">3 Gambits, all unchanged</text>

  <rect x="290" y="88" width="200" height="45" rx="4" fill="#3e2723" stroke="#d4af37"/>
  <text x="390" y="103" text-anchor="middle" fill="#d4af37" font-size="9">Teleport | Ult Counter | Heal Board</text>
  <text x="390" y="117" text-anchor="middle" fill="#4caf50" font-size="9">+ Missigno's, Whip, Dead or Alive,</text>
  <text x="390" y="127" text-anchor="middle" fill="#4caf50" font-size="9">Graal's, Bunker's</text>

  <!-- A-Tier -->
  <text x="30" y="152" fill="#2196f3" font-size="12" font-weight="bold">A-TIER</text>
  <rect x="30" y="158" width="200" height="30" rx="4" fill="#0d47a1" stroke="#2196f3"/>
  <text x="130" y="177" text-anchor="middle" fill="#bbdefb" font-size="10">Backstab | Chain Capture | King's Shield</text>

  <rect x="290" y="158" width="200" height="30" rx="4" fill="#0d47a1" stroke="#2196f3"/>
  <text x="390" y="177" text-anchor="middle" fill="#bbdefb" font-size="10">Show Jumping | Pendant | Chamberlain</text>

  <!-- B-Tier -->
  <text x="30" y="210" fill="#ff9800" font-size="12" font-weight="bold">B-TIER</text>
  <rect x="30" y="216" width="200" height="30" rx="4" fill="#e65100" stroke="#ff9800"/>
  <text x="130" y="235" text-anchor="middle" fill="#ffe0b2" font-size="10">Knight B Combo | Jackpot | Steal... etc</text>

  <rect x="290" y="216" width="200" height="30" rx="4" fill="#e65100" stroke="#ff9800"/>
  <text x="390" y="235" text-anchor="middle" fill="#ffe0b2" font-size="10">Templar (was S, dropped to B)</text>

  <!-- C-Tier -->
  <text x="30" y="268" fill="#888" font-size="12" font-weight="bold">C-TIER</text>
  <rect x="30" y="274" width="200" height="30" rx="4" fill="#333" stroke="#888"/>
  <text x="130" y="293" text-anchor="middle" fill="#e0d5c1" font-size="10">Undo | Gravity | Surround | Pierce</text>

  <rect x="290" y="274" width="200" height="30" rx="4" fill="#333" stroke="#888"/>
  <text x="390" y="293" text-anchor="middle" fill="#e0d5c1" font-size="10">Lich | Squire | Makibishi</text>

  <!-- Key movement arrows -->
  <text x="260" y="112" text-anchor="middle" fill="#4caf50" font-size="16">--&gt;</text>
  <text x="260" y="233" text-anchor="middle" fill="#f44336" font-size="16">--&gt;</text>

  <!-- Summary -->
  <text x="130" y="340" text-anchor="middle" fill="#f44336" font-size="11">Templar: S--&gt;B  (biggest drop)</text>
  <text x="130" y="358" text-anchor="middle" fill="#888" font-size="11">6 Gambits: C/B --&gt; A/S</text>

  <text x="390" y="340" text-anchor="middle" fill="#4caf50" font-size="11">New Missigno's: enters S</text>
  <text x="390" y="358" text-anchor="middle" fill="#4caf50" font-size="11">New Graal's: enters S</text>
</svg>