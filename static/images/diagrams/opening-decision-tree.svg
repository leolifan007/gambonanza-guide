<svg xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif" width="700" height="380" viewBox="0 0 700 380">
<rect width="700" height="380" fill="#1A0F1A" rx="12"/>
<text x="350" y="35" fill="#D4A84A" font-family="'VT323',monospace" font-size="22" text-anchor="middle">Universal Opening Template - Turn 1-3</text>

<!-- Turn 1 -->
<rect x="35" y="65" width="190" height="130" rx="8" fill="#2D1A2D" stroke="#4A9B9B" stroke-width="1.5"/>
<rect x="35" y="65" width="190" height="28" rx="8" fill="#4A9B9B" opacity="0.2"/>
<text x="130" y="84" fill="#4A9B9B" font-family="'VT323',monospace" font-size="15" text-anchor="middle">Turn 1: MOVE</text>
<text x="130" y="108" fill="#F5E6D3" font-size="12" font-weight="bold" text-anchor="middle">Control Center</text>
<text x="130" y="128" fill="#E8D5C0" font-size="11" text-anchor="middle">Move center piece</text>
<text x="130" y="146" fill="#E8D5C0" font-size="11" text-anchor="middle">2 squares forward</text>
<text x="130" y="164" fill="#E8D5C0" font-size="11" text-anchor="middle">Center opponent's side</text>
<text x="130" y="182" fill="#5CB85C" font-size="11" text-anchor="middle">100% safe move</text>

<arrow x="235" y="130" fill="#E8D5C0" font-size="20">-></arrow>

<!-- Turn 2 -->
<rect x="255" y="65" width="190" height="130" rx="8" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5"/>
<rect x="255" y="65" width="190" height="28" rx="8" fill="#D4A84A" opacity="0.2"/>
<text x="350" y="84" fill="#D4A84A" font-family="'VT323',monospace" font-size="15" text-anchor="middle">Turn 2: PICK</text>
<text x="350" y="108" fill="#F5E6D3" font-size="12" font-weight="bold" text-anchor="middle">Buy ANY Gambit</text>
<text x="350" y="128" fill="#E8D5C0" font-size="11" text-anchor="middle">Shop gambit available?</text>
<text x="350" y="146" fill="#D4A84A" font-size="11" text-anchor="middle">Buy it</text>
<text x="350" y="164" fill="#E8D5C0" font-size="11" text-anchor="middle">None affordable?</text>
<text x="350" y="182" fill="#5CB85C" font-size="11" text-anchor="middle">Buy the cheapest one</text>

<arrow x="455" y="130" fill="#E8D5C0" font-size="20">-></arrow>

<!-- Turn 3 -->
<rect x="475" y="65" width="190" height="130" rx="8" fill="#2D1A2D" stroke="#D4764A" stroke-width="1.5"/>
<rect x="475" y="65" width="190" height="28" rx="8" fill="#D4764A" opacity="0.2"/>
<text x="570" y="84" fill="#D4764A" font-family="'VT323',monospace" font-size="15" text-anchor="middle">Turn 3: SYNERGIZE</text>
<text x="570" y="108" fill="#F5E6D3" font-size="12" font-weight="bold" text-anchor="middle">Create Interaction</text>
<text x="570" y="128" fill="#E8D5C0" font-size="11" text-anchor="middle">Apply gambit near</text>
<text x="570" y="146" fill="#E8D5C0" font-size="11" text-anchor="middle">your center piece</text>
<text x="570" y="164" fill="#E8D5C0" font-size="11" text-anchor="middle">Build 1 synergy</text>
<text x="570" y="182" fill="#D4764A" font-size="11" text-anchor="middle">Not perfect, just 1 link</text>

<!-- Traps -->
<rect x="100" y="215" width="500" height="80" rx="8" fill="#3A2030" stroke="#D4A84A" stroke-width="1"/>
<text x="350" y="238" fill="#D4A84A" font-family="'VT323',monospace" font-size="14" text-anchor="middle">3 Opening Traps to Avoid</text>
<text x="350" y="258" fill="#E8D5C0" font-size="11" text-anchor="middle">Trap 1: Overextension - Dont move a piece more than 2 squares from start</text>
<text x="350" y="276" fill="#E8D5C0" font-size="11" text-anchor="middle">Trap 2: Saving for big gambit - Buy ANY gambit, dont hoard</text>
<text x="350" y="294" fill="#E8D5C0" font-size="11" text-anchor="middle">Trap 3: Seed superstition - This template works with ANY seed</text>

<rect x="100" y="310" width="500" height="28" rx="4" fill="#2D1A2D" stroke="#5CB85C" stroke-width="1"/>
<text x="350" y="329" fill="#5CB85C" font-family="'VT323',monospace" font-size="13" text-anchor="middle">Tested 50+ runs - Works with ANY starting piece, board, seed</text>
</svg>