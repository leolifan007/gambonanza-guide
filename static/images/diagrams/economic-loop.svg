<text x="300" y="100" fill="#F5E6D3" font-size="13" text-anchor="middle">Take Economic Gambit</text>

<rect x="370" y="195" width="200" height="50" rx="8" fill="#2D1A2D" stroke="#5CB85C" stroke-width="1.5"/>
