<svg xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif" width="600" height="420" viewBox="0 0 600 420">
<rect width="600" height="420" fill="#1A0F1A" rx="12"/>
<text x="300" y="38" fill="#D4A84A" font-family="'VT323',monospace" font-size="22" text-anchor="middle">Piece Pruning Priority Pyramid</text>

<!-- S-Tier -->
<rect x="190" y="60" width="220" height="50" rx="8" fill="#2D1A2D" stroke="#5CB85C" stroke-width="2"/>
<text x="300" y="83" fill="#5CB85C" font-family="'VT323',monospace" font-size="15" text-anchor="middle">S-Tier: KEEP</text>
<text x="300" y="100" fill="#E8D5C0" font-size="11" text-anchor="middle">Economy generators + Gambit cores</text>

<line x1="150" y1="115" x2="450" y2="115" stroke="#E8D5C0" stroke-width="0.5" opacity="0.3"/>

<!-- A-Tier -->
<rect x="160" y="120" width="280" height="50" rx="8" fill="#2D1A2D" stroke="#4A9B9B" stroke-width="1.5"/>
<text x="300" y="143" fill="#4A9B9B" font-family="'VT323',monospace" font-size="15" text-anchor="middle">A-Tier: KEEP if synergized</text>
<text x="300" y="160" fill="#E8D5C0" font-size="11" text-anchor="middle">Board control + Synergy hubs</text>

<line x1="120" y1="175" x2="480" y2="175" stroke="#E8D5C0" stroke-width="0.5" opacity="0.3"/>

<!-- B-Tier -->
<rect x="130" y="180" width="340" height="50" rx="8" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5"/>
<text x="300" y="203" fill="#D4A84A" font-family="'VT323',monospace" font-size="15" text-anchor="middle">B-Tier: TEMPORARY</text>
<text x="300" y="220" fill="#E8D5C0" font-size="11" text-anchor="middle">Replace if better option appears</text>

<line x1="90" y1="235" x2="510" y2="235" stroke="#E8D5C0" stroke-width="0.5" opacity="0.3"/>

<!-- C-Tier -->
<rect x="100" y="240" width="400" height="50" rx="8" fill="#2D1A2D" stroke="#D4764A" stroke-width="1.5"/>
<text x="300" y="263" fill="#D4764A" font-family="'VT323',monospace" font-size="15" text-anchor="middle">C-Tier: SELL FIRST</text>
<text x="300" y="280" fill="#E8D5C0" font-size="11" text-anchor="middle">No gambit synergy, no economy value</text>

<line x1="60" y1="295" x2="540" y2="295" stroke="#E8D5C0" stroke-width="0.5" opacity="0.3"/>

<!-- Sell rules -->
<rect x="50" y="300" width="500" height="105" rx="8" fill="#3A2030" stroke="#D4A84A" stroke-width="1"/>
<text x="300" y="320" fill="#D4A84A" font-family="'VT323',monospace" font-size="14" text-anchor="middle">3-Second Sell Decision Rule</text>
<text x="65" y="345" fill="#5CB85C" font-size="12">Second 1:</text>
<text x="150" y="345" fill="#F5E6D3" font-size="12">Any C-tier pieces? Sell one. Done.</text>
<text x="65" y="365" fill="#D4A84A" font-size="12">Second 2:</text>
<text x="150" y="365" fill="#F5E6D3" font-size="12">No C-tier. Worst B-tier doing &lt;2 stock/turn? Sell.</text>
<text x="65" y="385" fill="#D4764A" font-size="12">Second 3:</text>
<text x="150" y="385" fill="#F5E6D3" font-size="12">Only A-tier left. New piece a direct upgrade? Sell A. Else keep.</text>
</svg>