<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="system-ui, sans-serif" font-size="13">
  <rect width="600" height="400" fill="#1a1a2e" rx="8"/>
  <text x="300" y="28" text-anchor="middle" fill="#e0d5c1" font-size="16" font-weight="bold">v1.3.0 Balance Changes at a Glance</text>

  <text x="30" y="60" fill="#d4af37" font-size="14" font-weight="bold">Gambit</text>
  <text x="200" y="60" fill="#d4af37" font-size="14" font-weight="bold" text-anchor="middle">Before</text>
  <text x="350" y="60" fill="#d4af37" font-size="14" font-weight="bold" text-anchor="middle">After</text>
  <text x="500" y="60" fill="#d4af37" font-size="14" font-weight="bold" text-anchor="middle">Change</text>

  <line x1="30" y1="65" x2="570" y2="65" stroke="#d4af37" stroke-width="1" opacity="0.5"/>

  <text x="30" y="90" fill="#e0d5c1">Templar's</text>
  <text x="200" y="90" fill="#4caf50" text-anchor="middle">1/1 Guaranteed</text>
  <text x="350" y="90" fill="#f44336" text-anchor="middle">1/3 Chance</text>
  <text x="500" y="90" fill="#f44336" text-anchor="middle">Nerf</text>

  <text x="30" y="115" fill="#e0d5c1">Whip's</text>
  <text x="200" y="115" fill="#ff9800" text-anchor="middle">1/2 Chance</text>
  <text x="350" y="115" fill="#4caf50" text-anchor="middle">1/1 Guaranteed</text>
  <text x="500" y="115" fill="#4caf50" text-anchor="middle">Buff</text>

  <text x="30" y="140" fill="#e0d5c1">Dead or Alive's</text>
  <text x="200" y="140" fill="#f44336" text-anchor="middle">1/3 Chance</text>
  <text x="350" y="140" fill="#4caf50" text-anchor="middle">1/1 Guaranteed</text>
  <text x="500" y="140" fill="#4caf50" text-anchor="middle">Buff</text>

  <text x="30" y="165" fill="#e0d5c1">Show Jumping's</text>
  <text x="200" y="165" fill="#ff9800" text-anchor="middle">1/2 Chance</text>
  <text x="350" y="165" fill="#4caf50" text-anchor="middle">1/1 Guaranteed</text>
  <text x="500" y="165" fill="#4caf50" text-anchor="middle">Buff</text>

  <text x="30" y="190" fill="#e0d5c1">Pendant's</text>
  <text x="200" y="190" fill="#ff9800" text-anchor="middle">1/2 Chance</text>
  <text x="350" y="190" fill="#4caf50" text-anchor="middle">1/1 Guaranteed</text>
  <text x="500" y="190" fill="#4caf50" text-anchor="middle">Buff</text>

  <text x="30" y="215" fill="#e0d5c1">Chamberlain's</text>
  <text x="200" y="215" fill="#ff9800" text-anchor="middle">1/2 Chance</text>
  <text x="350" y="215" fill="#4caf50" text-anchor="middle">1/1 Guaranteed</text>
  <text x="500" y="215" fill="#4caf50" text-anchor="middle">Buff</text>

  <text x="30" y="240" fill="#e0d5c1">Miracle's</text>
  <text x="200" y="240" fill="#f44336" text-anchor="middle">1/3 Chance</text>
  <text x="350" y="240" fill="#4caf50" text-anchor="middle">1/1 Guaranteed</text>
  <text x="500" y="240" fill="#4caf50" text-anchor="middle">Big Buff</text>

  <line x1="30" y1="255" x2="570" y2="255" stroke="#e0d5c1" stroke-width="0.5" opacity="0.3" stroke-dasharray="4"/>

  <text x="30" y="280" fill="#e0d5c1">Bunker's</text>
  <text x="200" y="280" fill="#ff9800" text-anchor="middle">+$3 Crumble only</text>
  <text x="350" y="280" fill="#4caf50" text-anchor="middle">+$1 Global</text>
  <text x="500" y="280" fill="#2196f3" text-anchor="middle">Rework</text>

  <text x="30" y="305" fill="#e0d5c1">Missigno's</text>
  <text x="200" y="305" fill="#888" text-anchor="middle">---</text>
  <text x="350" y="305" fill="#d4af37" text-anchor="middle">Randomize all pieces</text>
  <text x="500" y="305" fill="#d4af37" text-anchor="middle">New!</text>

  <text x="30" y="330" fill="#e0d5c1">Graal's</text>
  <text x="200" y="330" fill="#888" text-anchor="middle">---</text>
  <text x="350" y="330" fill="#d4af37" text-anchor="middle">Bless Tile on Gambit</text>
  <text x="500" y="330" fill="#d4af37" text-anchor="middle">New!</text>

  <text x="30" y="355" fill="#e0d5c1">Shield's / Trojan's</text>
  <text x="200" y="355" fill="#888" text-anchor="middle">Existed</text>
  <text x="350" y="355" fill="#888" text-anchor="middle">Removed</text>
  <text x="500" y="355" fill="#f44336" text-anchor="middle">Removed</text>

  <text x="30" y="382" fill="#888" font-size="11">Green = buffed / new | Red = nerfed / removed | Blue = reworked</text>
</svg>