<text x="120" y="90" fill="#4A9B9B" font-family="'VT323',monospace" font-size="14" text-anchor="middle">Step 1</text>
<text x="120" y="120" fill="#F5E6D3" font-size="14" font-weight="bold" text-anchor="middle">Get Spectral Piece</text>
<text x="120" y="148" fill="#E8D5C0" font-size="12" text-anchor="middle">From Piece Wheel</text>
<text x="120" y="166" fill="#E8D5C0" font-size="12" text-anchor="middle">Shop events</text>
<text x="120" y="184" fill="#E8D5C0" font-size="12" text-anchor="middle">Gambit rewards</text>
<text x="120" y="210" fill="#E8D5C0" font-size="11" text-anchor="middle">Has expiration timer</text>
<text x="120" y="228" fill="#D4764A" font-size="11" text-anchor="middle">Must act before timer!</text>

<text x="225" y="160" fill="#D4A84A" font-size="28">-&gt;</text>

<rect x="260" y="70" width="180" height="180" rx="10" fill="#2D1A2D" stroke="#D4A84A" stroke-width="2"/>
<rect x="260" y="70" width="180" height="30" rx="10" fill="#D4A84A" opacity="0.2"/>
