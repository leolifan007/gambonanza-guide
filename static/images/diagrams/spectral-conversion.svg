<text x="350" y="120" fill="#F5E6D3" font-size="14" font-weight="bold" text-anchor="middle">Move to Gold Tile</text>
<circle cx="350" cy="152" r="18" fill="none" stroke="#D4A84A" stroke-width="2"/>
<text x="350" y="157" fill="#D4A84A" font-size="12" text-anchor="middle">$</text>
<text x="350" y="185" fill="#E8D5C0" font-size="12" text-anchor="middle">Gold tile converts</text>
<text x="350" y="203" fill="#E8D5C0" font-size="12" text-anchor="middle">spectral to permanent</text>
<text x="350" y="225" fill="#5CB85C" font-size="12" text-anchor="middle">Tile also generates $$</text>

<text x="455" y="160" fill="#D4A84A" font-size="28">-&gt;</text>

<rect x="490" y="70" width="180" height="180" rx="10" fill="#2D1A2D" stroke="#5CB85C" stroke-width="1.5"/>
<rect x="490" y="70" width="180" height="30" rx="10" fill="#5CB85C" opacity="0.2"/>
<text x="580" y="90" fill="#5CB85C" font-family="'VT323',monospace" font-size="14" text-anchor="middle">Step 3</text>
<text x="580" y="120" fill="#F5E6D3" font-size="14" font-weight="bold" text-anchor="middle">Permanent!</text>
<text x="580" y="148" fill="#E8D5C0" font-size="12" text-anchor="middle">Piece is now permanent</text>
<text x="580" y="166" fill="#E8D5C0" font-size="12" text-anchor="middle">Retains all buffs</text>
<text x="580" y="184" fill="#E8D5C0" font-size="12" text-anchor="middle">No expiration</text>
<text x="580" y="210" fill="#D4A84A" font-size="12" text-anchor="middle">VALUE DOUBLED:</text>
<text x="580" y="228" fill="#5CB85C" font-size="12" text-anchor="middle">Income + Permanent piece</text>

<rect x="100" y="270" width="500" height="36" rx="6" fill="#3A2030" stroke="#D4A84A" stroke-width="1"/>
<text x="350" y="293" fill="#D4A84A" font-family="'VT323',monospace" font-size="14" text-anchor="middle">Community verified on Reddit and YouTube - Best value mechanic in v1.1.0</text>
