<svg xmlns="http://www.w3.org/2000/svg" font-family="Inter,sans-serif" width="700" height="320" viewBox="0 0 700 320">
<rect width="700" height="320" fill="#1A0F1A" rx="12"/>
<text x="350" y="35" fill="#D4A84A" font-family="'VT323',monospace" font-size="22" text-anchor="middle">Spectral Piece - Gold Tile Conversion Flow</text>

<rect x="30" y="70" width="180" height="180" rx="10" fill="#2D1A2D" stroke="#4A9B9B" stroke-width="1.5"/>
