<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="system-ui, sans-serif" font-size="12">
  <rect width="480" height="280" fill="#1a1a2e" rx="8"/>
  <text x="240" y="25" text-anchor="middle" fill="#d4af37" font-size="15" font-weight="bold">Bunker's Gambit: Old vs New</text>

  <!-- Old -->
  <rect x="20" y="45" width="210" height="210" rx="8" fill="#333" stroke="#f44336"/>
  <text x="125" y="68" text-anchor="middle" fill="#f44336" font-size="13" font-weight="bold">Old (v1.2)</text>
  <text x="125" y="92" text-anchor="middle" fill="#888" font-size="11">PROTECT during Crumble = $3</text>
  <line x1="30" y1="105" x2="220" y2="105" stroke="#555" stroke-width="0.5"/>

  <text x="125" y="125" text-anchor="middle" fill="#e0d5c1" font-size="11">Stages 1-3: $0</text>
  <text x="125" y="145" text-anchor="middle" fill="#e0d5c1" font-size="11">Stage 4+ (Crumble): $3/protect</text>
  <text x="125" y="165" text-anchor="middle" fill="#e0d5c1" font-size="11">~10-15 triggers total</text>
  <text x="125" y="185" text-anchor="middle" fill="#e0d5c1" font-size="11">= $30-45 per run</text>
  <text x="125" y="215" text-anchor="middle" fill="#f44336" font-size="11">Only useful half the game</text>
  <text x="125" y="235" text-anchor="middle" fill="#888" font-size="11">Crumble-only = wasted early</text>

  <!-- Arrow -->
  <text x="240" y="145" text-anchor="middle" fill="#d4af37" font-size="16">--&gt;</text>

  <!-- New -->
  <rect x="255" y="45" width="210" height="210" rx="8" fill="#333" stroke="#4caf50"/>
  <text x="360" y="68" text-anchor="middle" fill="#4caf50" font-size="13" font-weight="bold">New (v1.3)</text>
  <text x="360" y="92" text-anchor="middle" fill="#e0d5c1" font-size="11">Any PROTECT = $1</text>
  <line x1="265" y1="105" x2="455" y2="105" stroke="#555" stroke-width="0.5"/>

  <text x="360" y="125" text-anchor="middle" fill="#e0d5c1" font-size="11">Stages 1-3: $1/protect</text>
  <text x="360" y="145" text-anchor="middle" fill="#e0d5c1" font-size="11">Stage 4+ (Crumble): $1/protect</text>
  <text x="360" y="165" text-anchor="middle" fill="#e0d5c1" font-size="11">~50-80 triggers total</text>
  <text x="360" y="185" text-anchor="middle" fill="#4caf50" font-size="11">= $50-80 per run</text>
  <text x="360" y="215" text-anchor="middle" fill="#4caf50" font-size="11">Works from turn 1!</text>
  <text x="360" y="235" text-anchor="middle" fill="#4caf50" font-size="11">Better total value + utility</text>
</svg>