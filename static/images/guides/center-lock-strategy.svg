<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e6a817"/>
    </marker>
  </defs>

  <rect width="440" height="220" rx="12" fill="url(#bg)"/>

  <text x="220" y="28" text-anchor="middle" fill="#e6a817" font-size="14" font-weight="bold">⚔ Center Lock Strategy</text>

  <!-- Step 1 -->
  <g transform="translate(20,45)">
    <rect width="400" height="42" rx="8" fill="#0f3460" stroke="#1565c0" stroke-width="1.5"/>
    <text x="20" y="27" fill="#64b5f6" font-size="18">♞</text>
    <text x="48" y="27" fill="#f5f5f5" font-size="13">Turn 1: Knight → center</text>
    <text x="380" y="27" text-anchor="end" fill="#5c6bc0" font-size="11">S-tier tile</text>
  </g>

  <!-- Arrow -->
  <line x1="220" y1="87" x2="220" y2="97" stroke="#e6a817" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <g transform="translate(20,102)">
    <rect width="400" height="42" rx="8" fill="#0f3460" stroke="#1565c0" stroke-width="1.5"/>
    <text x="20" y="27" fill="#64b5f6" font-size="18">♝♜</text>
    <text x="58" y="27" fill="#f5f5f5" font-size="13">Turn 2: Bishop/Rook → reinforce center</text>
    <text x="380" y="27" text-anchor="end" fill="#5c6bc0" font-size="11">A-tier tiles</text>
  </g>

  <!-- Arrow -->
  <line x1="220" y1="144" x2="220" y2="154" stroke="#e6a817" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <g transform="translate(20,159)">
    <rect width="400" height="42" rx="8" fill="#0d2a0d" stroke="#4caf50" stroke-width="2"/>
    <text x="20" y="27" fill="#4caf50" font-size="18">🏰</text>
    <text x="48" y="27" fill="#f5f5f5" font-size="13">Turn 3: Fortress Gambit on center piece</text>
    <text x="380" y="27" text-anchor="end" fill="#81c784" font-size="11">Tile locked ✓</text>
  </g>
</svg>