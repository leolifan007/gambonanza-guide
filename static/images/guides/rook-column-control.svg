<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 220" width="100%" height="auto" style="max-width:560px;display:block;margin:0 auto" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>
    <filter id="g"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/></filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C09050"/>
    </marker>
  </defs>
  <rect width="560" height="220" rx="10" fill="#120812" filter="url(#g)"/>
  <!-- Title -->
  <text x="280" y="28" text-anchor="middle" fill="#E0D0C0" font-size="14" font-weight="bold" filter="url(#s)">🔥 Rook Column Control Strategy (6x6 Board)</text>
  <!-- Step 1: Position Rook -->
  <g transform="translate(16,40)">
    <rect width="170" height="130" rx="6" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5"/>
    <rect width="170" height="28" rx="6" fill="#2A1420"/>
    <text x="85" y="20" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold" filter="url(#s)">POSITION</text>
    <!-- Chess board grid 2x2 -->
    <rect x="40" y="36" width="88" height="88" rx="2" fill="#1A0D1A" stroke="#3A2A3A" stroke-width="1"/>
    <rect x="40" y="36" width="22" height="22" fill="#2D1A2D"/>
    <rect x="62" y="36" width="22" height="22" fill="#3A2A3A"/>
    <rect x="84" y="36" width="22" height="22" fill="#2D1A2D"/>
    <rect x="106" y="36" width="22" height="22" fill="#3A2A3A"/>
    <rect x="40" y="58" width="22" height="22" fill="#3A2A3A"/>
    <rect x="62" y="58" width="22" height="22" fill="#2D1A2D"/>
    <rect x="84" y="58" width="22" height="22" fill="#3A2A3A"/>
    <rect x="106" y="58" width="22" height="22" fill="#2D1A2D"/>
    <rect x="40" y="80" width="22" height="22" fill="#2D1A2D"/>
    <rect x="62" y="80" width="22" height="22" fill="#3A2A3A"/>
    <rect x="84" y="80" width="22" height="22" fill="#2D1A2D"/>
    <rect x="106" y="80" width="22" height="22" fill="#3A2A3A"/>
    <rect x="40" y="102" width="22" height="22" fill="#3A2A3A"/>
    <rect x="62" y="102" width="22" height="22" fill="#2D1A2D"/>
    <rect x="84" y="102" width="22" height="22" fill="#3A2A3A"/>
    <rect x="106" y="102" width="22" height="22" fill="#2D1A2D"/>
    <!-- Rook piece on column 2 -->
    <text x="73" y="116" text-anchor="middle" fill="#F0C040" font-size="20" filter="url(#s)">♜</text>
    <!-- Highlight column -->
    <rect x="62" y="36" width="22" height="88" rx="1" fill="#C09050" opacity="0.15"/>
    <text x="85" y="40" text-anchor="middle" fill="#C09050" font-size="8">Col B</text>
  </g>
  <!-- Arrow -->
  <line x1="190" y1="105" x2="210" y2="105" stroke="#C09050" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Step 2: Suppression Zone -->
  <g transform="translate(215,40)">
    <rect width="170" height="130" rx="6" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5"/>
    <rect width="170" height="28" rx="6" fill="#3A1A10"/>
    <text x="85" y="20" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold" filter="url(#s)">SUPPRESS</text>
    <!-- Suppression zone showing column control -->
    <rect x="40" y="36" width="88" height="40" rx="4" fill="#C09050" opacity="0.15"/>
    <text x="84" y="62" text-anchor="middle" fill="#C09050" font-size="11">Col B Zone</text>
    <!-- Piece icons in zone -->
    <text x="50" y="100" fill="#E0D0C0" font-size="18" filter="url(#s)">♜</text>
    <text x="74" y="109" fill="#C08870" font-size="12">+</text>
    <text x="96" y="109" fill="#C08870" font-size="12">♙</text>
    <text x="114" y="109" fill="#C08870" font-size="12">♙</text>
    <text x="40" y="126" fill="#C08870" font-size="9">Rook controls column</text>
  </g>
  <!-- Arrow -->
  <line x1="390" y1="105" x2="410" y2="105" stroke="#C09050" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Step 3: Gambit Profit -->
  <g transform="translate(415,40)">
    <rect width="130" height="130" rx="6" fill="#142E1A" stroke="#4CAF50" stroke-width="2" filter="url(#g)"/>
    <rect width="130" height="28" rx="6" fill="#0E2A12"/>
    <text x="65" y="20" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold" filter="url(#s)">PROFIT</text>
    <text x="65" y="60" text-anchor="middle" fill="#81C784" font-size="22" filter="url(#g)">+12</text>
    <text x="65" y="80" text-anchor="middle" fill="#4CAF50" font-size="13">Stock/turn</text>
    <text x="65" y="104" text-anchor="middle" fill="#81C784" font-size="12">💰</text>
    <text x="65" y="122" text-anchor="middle" fill="#81C784" font-size="9">65% Win Rate</text>
  </g>
</svg>