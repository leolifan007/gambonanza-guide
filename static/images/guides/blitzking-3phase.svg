<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="phase1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#1976d2"/>
    </linearGradient>
    <linearGradient id="phase2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e65100"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="phase3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
    <marker id="arrowW" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e6a817"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="680" height="520" rx="12" fill="url(#bg)"/>
  <g opacity="0.03">
    <rect x="0" y="0" width="25" height="25" fill="#fff"/><rect x="25" y="25" width="25" height="25" fill="#fff"/>
    <rect x="50" y="0" width="25" height="25" fill="#fff"/><rect x="75" y="25" width="25" height="25" fill="#fff"/>
  </g>

  <!-- Phase 1 Header -->
  <rect x="30" y="20" width="620" height="36" rx="8" fill="url(#phase1)"/>
  <text x="50" y="44" fill="#fff" font-size="16" font-weight="bold">PHASE 1: SETUP</text>
  <text x="610" y="44" fill="#bbdefb" font-size="13" text-anchor="end">Turns 1-3</text>

  <!-- Phase 1 Steps -->
  <g transform="translate(50,75)">
    <rect width="280" height="44" rx="8" fill="#0f3460" stroke="#1976d2" stroke-width="1.5"/>
    <text x="14" y="28" fill="#64b5f6" font-size="18">♞</text>
    <text x="40" y="28" fill="#f5f5f5" font-size="13">Deploy Knight to center</text>
  </g>
  <line x1="190" y1="119" x2="190" y2="130" stroke="#e6a817" stroke-width="2" marker-end="url(#arrowW)"/>
  <g transform="translate(50,135)">
    <rect width="280" height="44" rx="8" fill="#0f3460" stroke="#1976d2" stroke-width="1.5"/>
    <text x="14" y="28" fill="#64b5f6" font-size="18">♝</text>
    <text x="40" y="28" fill="#f5f5f5" font-size="13">Develop 2nd piece (Bishop/Rook)</text>
  </g>
  <line x1="190" y1="179" x2="190" y2="190" stroke="#e6a817" stroke-width="2" marker-end="url(#arrowW)"/>
  <g transform="translate(50,195)">
    <rect width="280" height="44" rx="8" fill="#0f3460" stroke="#1976d2" stroke-width="1.5"/>
    <text x="14" y="28" fill="#64b5f6" font-size="18">❄</text>
    <text x="40" y="28" fill="#f5f5f5" font-size="13">Play Freeze / Early Check</text>
  </g>

  <!-- Phase 1 Goal -->
  <g transform="translate(370,120)">
    <rect width="270" height="50" rx="8" fill="#0a1931" stroke="#1976d2" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="135" y="22" text-anchor="middle" fill="#90caf9" font-size="11" font-weight="bold">🎯 GOAL</text>
    <text x="135" y="40" text-anchor="middle" fill="#bbdefb" font-size="12">Force ≥1 wasted action</text>
  </g>

  <!-- Arrow between phases -->
  <line x1="190" y1="244" x2="190" y2="266" stroke="#e6a817" stroke-width="3" marker-end="url(#arrowW)"/>

  <!-- Phase 2 Header -->
  <rect x="30" y="270" width="620" height="36" rx="8" fill="url(#phase2)"/>
  <text x="50" y="294" fill="#fff" font-size="16" font-weight="bold">PHASE 2: PRESSURE</text>
  <text x="610" y="294" fill="#ffe0b2" font-size="13" text-anchor="end">Turns 4-6</text>

  <!-- Phase 2 Steps -->
  <g transform="translate(50,325)">
    <rect width="280" height="44" rx="8" fill="#1b0f00" stroke="#f57c00" stroke-width="1.5"/>
    <text x="14" y="28" fill="#ffb74d" font-size="18">♞</text>
    <text x="40" y="28" fill="#f5f5f5" font-size="13">Knight fork (threaten 2)</text>
  </g>
  <line x1="190" y1="369" x2="190" y2="380" stroke="#e6a817" stroke-width="2" marker-end="url(#arrowW)"/>
  <g transform="translate(50,385)">
    <rect width="280" height="44" rx="8" fill="#1b0f00" stroke="#f57c00" stroke-width="1.5"/>
    <text x="14" y="28" fill="#ffb74d" font-size="18">♛</text>
    <text x="40" y="28" fill="#f5f5f5" font-size="13">Deploy Queen if available</text>
  </g>

  <!-- Phase 2 Goal -->
  <g transform="translate(370,330)">
    <rect width="270" height="50" rx="8" fill="#1a0d00" stroke="#f57c00" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="135" y="22" text-anchor="middle" fill="#ffb74d" font-size="11" font-weight="bold">🎯 GOAL</text>
    <text x="135" y="40" text-anchor="middle" fill="#ffe0b2" font-size="12">Insurmountable material advantage</text>
  </g>

  <!-- Arrow between phases -->
  <line x1="190" y1="434" x2="190" y2="446" stroke="#e6a817" stroke-width="3" marker-end="url(#arrowW)"/>

  <!-- Phase 3 Header -->
  <rect x="30" y="450" width="620" height="36" rx="8" fill="url(#phase3)" filter="url(#glow)"/>
  <text x="50" y="474" fill="#fff" font-size="16" font-weight="bold">PHASE 3: CLOSE</text>
  <text x="610" y="474" fill="#c8e6c9" font-size="13" text-anchor="end">Turn 7+</text>

  <!-- Phase 3 inline -->
  <g transform="translate(50,492)">
    <text x="0" y="14" fill="#81c784" font-size="13" font-weight="bold">Check King every turn → Each check = 1 wasted Blitzking action → Checkmate</text>
  </g>
</svg>