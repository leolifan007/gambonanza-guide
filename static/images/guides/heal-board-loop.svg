<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="'Segoe UI','Inter',sans-serif">  <defs>    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>    <filter id="g"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/></filter>    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">      <polygon points="0 0, 10 3.5, 0 7" fill="#C09050"/>    </marker>  </defs>  <rect width="480" height="280" rx="10" fill="#120812" filter="url(#g)"/>  <text x="240" y="30" text-anchor="middle" fill="#E0D0C0" font-size="14" font-weight="bold">?? Heal Board Loop</text>  <!-- Node 1: Tile collapses (top) -->  <g transform="translate(170,50)">    <rect width="140" height="50" rx="6" fill="#2D1A2D" stroke="#D44030" stroke-width="1.5" filter="url(#s)"/>    <text x="70" y="22" text-anchor="middle" fill="#D44030" font-size="20" filter="url(#s)">??</text>    <text x="70" y="42" text-anchor="middle" fill="#E0D0C0" font-size="12">Tile Collapses</text>  </g>  <!-- Node 2: Play Heal Board (right) -->  <g transform="translate(310,110)">    <rect width="140" height="50" rx="6" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5" filter="url(#s)"/>    <text x="70" y="22" text-anchor="middle" fill="#F0C040" font-size="20" filter="url(#s)">??</text>    <text x="70" y="42" text-anchor="middle" fill="#E0D0C0" font-size="12">Play Heal Board</text>  </g>  <!-- Node 3: Tile restored + Gambit (bottom) -->  <g transform="translate(170,170)">    <rect width="140" height="50" rx="6" fill="#142E1A" stroke="#4CAF50" stroke-width="1.5" filter="url(#s)"/>    <text x="70" y="22" text-anchor="middle" fill="#81C784" font-size="20" filter="url(#s)">?</text>    <text x="70" y="42" text-anchor="middle" fill="#E0D0C0" font-size="12">Tile + Gambit Restored</text>  </g>  <!-- Node 4: Trigger Free Gambit (left) -->  <g transform="translate(30,110)">    <rect width="140" height="50" rx="6" fill="#2D1A2D" stroke="#F0C040" stroke-width="1.5" filter="url(#s)"/>    <text x="70" y="22" text-anchor="middle" fill="#F0C040" font-size="20" filter="url(#s)">?</text>    <text x="70" y="42" text-anchor="middle" fill="#E0D0C0" font-size="12">Trigger Free Gambit</text>  </g>  <!-- Arrows forming the loop -->  <path d="M 310,100 Q 340,80 340,110" fill="none" stroke="#C09050" stroke-width="2.5" marker-end="url(#arr)"/>  <path d="M 380,160 Q 350,190 310,195" fill="none" stroke="#C09050" stroke-width="2.5" marker-end="url(#arr)"/>  <path d="M 170,195 Q 140,190 140,160" fill="none" stroke="#C09050" stroke-width="2.5" marker-end="url(#arr)"/>  <path d="M 100,110 Q 120,80 170,75" fill="none" stroke="#C09050" stroke-width="2.5" marker-end="url(#arr)"/>  <!-- Center label -->  <g transform="translate(190,120)">    <text x="50" y="0" text-anchor="middle" fill="#F0C040" font-size="14" font-weight="bold">+8-12</text>    <text x="50" y="18" text-anchor="middle" fill="#C08870" font-size="10">stock per loop</text>  </g>  <!-- Bottom note -->  <text x="240" y="262" text-anchor="middle" fill="#81C784" font-size="11">Heal Board restores tiles WITH their Gambit properties ˇú farm Free Gambit tiles forever</text></svg>