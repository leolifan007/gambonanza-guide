<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" width="100%" height="auto" style="max-width:700px;display:block;margin:0 auto" font-family="'Segoe UI','Inter',sans-serif">
  <defs>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/></filter>
    <filter id="g"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/></filter>
  </defs>
  <rect width="700" height="230" rx="10" fill="#120812" filter="url(#g)"/>
  <text x="350" y="26" text-anchor="middle" fill="#E0D0C0" font-size="14" font-weight="bold" filter="url(#s)">🎯 Board Size Strategy Comparison</text>
  
  <!-- 4x4 Board - Speed / Aggro -->
  <g transform="translate(12,36)">
    <rect width="220" height="175" rx="6" fill="#2D1A2D" stroke="#FF6B35" stroke-width="1.5"/>
    <rect width="220" height="32" rx="6" fill="#3A1A0A"/>
    <text x="110" y="22" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" filter="url(#s)">⚡ 4x4 - AGGRESSIVE</text>
    <!-- Mini chess board -->
    <rect x="30" y="42" width="160" height="60" rx="2" fill="#1A0D1A" stroke="#3A2A3A"/>
    <rect x="30" y="42" width="40" height="20" fill="#4A2A2A"/>
    <rect x="70" y="42" width="40" height="20" fill="#2D1A2D"/>
    <rect x="110" y="42" width="40" height="20" fill="#4A2A2A"/>
    <rect x="150" y="42" width="40" height="20" fill="#2D1A2D"/>
    <rect x="30" y="62" width="40" height="20" fill="#2D1A2D"/>
    <rect x="70" y="62" width="40" height="20" fill="#4A2A2A"/>
    <rect x="110" y="62" width="40" height="20" fill="#2D1A2D"/>
    <rect x="150" y="62" width="40" height="20" fill="#4A2A2A"/>
    <rect x="30" y="82" width="40" height="20" fill="#4A2A2A"/>
    <rect x="70" y="82" width="40" height="20" fill="#2D1A2D"/>
    <rect x="110" y="82" width="40" height="20" fill="#4A2A2A"/>
    <rect x="150" y="82" width="40" height="20" fill="#2D1A2D"/>
    <!-- Knight on center -->
    <text x="90" y="80" text-anchor="middle" fill="#F0C040" font-size="16" filter="url(#s)">♞</text>
    <!-- Stats -->
    <text x="110" y="118" text-anchor="middle" fill="#FF6B35" font-size="13" font-weight="bold">Knight Rush 62%</text>
    <text x="110" y="136" text-anchor="middle" fill="#C08870" font-size="11">8-12 turns</text>
    <text x="110" y="152" text-anchor="middle" fill="#C08870" font-size="11">30 stock = rich</text>
    <text x="46" y="170" text-anchor="middle" fill="#FF6B35" font-size="9">⬆ Aggro</text>
    <text x="110" y="170" text-anchor="middle" fill="#C08870" font-size="9">⬆ Economy</text>
    <text x="174" y="170" text-anchor="middle" fill="#c07050" font-size="9">⬇ Control</text>
  </g>
  
  <!-- 6x6 Board - Balanced -->
  <g transform="translate(240,36)">
    <rect width="220" height="175" rx="6" fill="#2D1A2D" stroke="#D4A84A" stroke-width="1.5"/>
    <rect width="220" height="32" rx="6" fill="#2A1420"/>
    <text x="110" y="22" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" filter="url(#s)">⚖️ 6x6 - BALANCED</text>
    <!-- Mini chess board -->
    <rect x="30" y="42" width="160" height="60" rx="2" fill="#1A0D1A" stroke="#3A2A3A"/>
    <rect x="30" y="42" width="40" height="20" fill="#2D1A2D"/>
    <rect x="70" y="42" width="40" height="20" fill="#3A2A3A"/>
    <rect x="110" y="42" width="40" height="20" fill="#2D1A2D"/>
    <rect x="150" y="42" width="40" height="20" fill="#3A2A3A"/>
    <rect x="30" y="62" width="40" height="20" fill="#3A2A3A"/>
    <rect x="70" y="62" width="40" height="20" fill="#2D1A2D"/>
    <rect x="110" y="62" width="40" height="20" fill="#3A2A3A"/>
    <rect x="150" y="62" width="40" height="20" fill="#2D1A2D"/>
    <rect x="30" y="82" width="40" height="20" fill="#2D1A2D"/>
    <rect x="70" y="82" width="40" height="20" fill="#3A2A3A"/>
    <rect x="110" y="82" width="40" height="20" fill="#2D1A2D"/>
    <rect x="150" y="82" width="40" height="20" fill="#3A2A3A"/>
    <!-- Rook center-left -->
    <text x="78" y="79" text-anchor="middle" fill="#F0C040" font-size="16" filter="url(#s)">♜</text>
    <!-- Bishop center-right -->
    <text x="108" y="79" text-anchor="middle" fill="#F0E0CC" font-size="14" filter="url(#s)">♝</text>
    <!-- Stats -->
    <text x="110" y="118" text-anchor="middle" fill="#D4A84A" font-size="13" font-weight="bold">Rook Control 65%</text>
    <text x="110" y="136" text-anchor="middle" fill="#C08870" font-size="11">12-18 turns</text>
    <text x="110" y="152" text-anchor="middle" fill="#C08870" font-size="11">50 stock = rich</text>
    <text x="46" y="170" text-anchor="middle" fill="#c07050" font-size="9">⬇ Aggro</text>
    <text x="110" y="170" text-anchor="middle" fill="#D4A84A" font-size="9">⬆ Control</text>
    <text x="174" y="170" text-anchor="middle" fill="#C08870" font-size="9">➡ Economy</text>
  </g>
  
  <!-- 8x8 Board - Economy -->
  <g transform="translate(468,36)">
    <rect width="220" height="175" rx="6" fill="#2D1A2D" stroke="#4CAF50" stroke-width="1.5"/>
    <rect width="220" height="32" rx="6" fill="#0E2A12"/>
    <text x="110" y="22" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold" filter="url(#s)">🐢 8x8 - ECONOMY</text>
    <!-- Mini chess board -->
    <rect x="30" y="42" width="160" height="60" rx="2" fill="#0A1A0A" stroke="#2A4A2A"/>
    <rect x="30" y="42" width="40" height="20" fill="#1A2A1A"/>
    <rect x="70" y="42" width="40" height="20" fill="#0A1A0A"/>
    <rect x="110" y="42" width="40" height="20" fill="#1A2A1A"/>
    <rect x="150" y="42" width="40" height="20" fill="#0A1A0A"/>
    <rect x="30" y="62" width="40" height="20" fill="#0A1A0A"/>
    <rect x="70" y="62" width="40" height="20" fill="#1A2A1A"/>
    <rect x="110" y="62" width="40" height="20" fill="#0A1A0A"/>
    <rect x="150" y="62" width="40" height="20" fill="#1A2A1A"/>
    <rect x="30" y="82" width="40" height="20" fill="#1A2A1A"/>
    <rect x="70" y="82" width="40" height="20" fill="#0A1A0A"/>
    <rect x="110" y="82" width="40" height="20" fill="#1A2A1A"/>
    <rect x="150" y="82" width="40" height="20" fill="#0A1A0A"/>
    <!-- Queen center -->
    <text x="90" y="79" text-anchor="middle" fill="#81C784" font-size="16" filter="url(#s)">♛</text>
    <!-- Stats -->
    <text x="110" y="118" text-anchor="middle" fill="#4CAF50" font-size="13" font-weight="bold">Economy Engine 72%</text>
    <text x="110" y="136" text-anchor="middle" fill="#81C784" font-size="11">18-30 turns</text>
    <text x="110" y="152" text-anchor="middle" fill="#81C784" font-size="11">100 stock = rich</text>
    <text x="46" y="170" text-anchor="middle" fill="#c07050" font-size="9">⬇ Aggro</text>
    <text x="110" y="170" text-anchor="middle" fill="#C08870" font-size="9">➡ Control</text>
    <text x="174" y="170" text-anchor="middle" fill="#4CAF50" font-size="9">⬆ Economy</text>
  </g>
</svg>