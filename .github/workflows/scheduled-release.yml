name: 内容自动发布

on:
  schedule:
    # 模拟人工发布：非整点随机时间
    - cron: '11 1 * * 1-5'       # 09:11 CST (01:11 UTC) 周一至周五
    - cron: '48 5 * * 1,3,5'     # 13:48 CST (05:48 UTC) 周一三五
    - cron: '23 9 * * 2,4'       # 17:23 CST (09:23 UTC) 周二四
  workflow_dispatch:
    # 手动触发用于测试

permissions:
  contents: write

jobs:
  content-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout content-polishing branch
        uses: actions/checkout@v4
        with:
          ref: content-polishing
          fetch-depth: 0

      - name: Sync with main
        run: |
          git config user.name "Gambonan Bot"
          git config user.email "bot@gambonanzaguide.com"
          git fetch origin main
          git merge origin/main --no-edit || { echo "::error::Merge conflict with main — manual fix required"; exit 1; }

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: false

      - name: Auto-publish hidden articles
        run: |
          chmod +x .github/scripts/auto-publish.sh
          bash .github/scripts/auto-publish.sh

      - name: Hugo build
        run: hugo --minify

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: Push content-polishing changes
        run: |
          git push origin content-polishing

      - name: Merge to main
        run: |
          git fetch origin main
          git checkout main
          git merge content-polishing --no-edit
          git push origin main