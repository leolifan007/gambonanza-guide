name: 内容自动发布

on:
  schedule:
    # 每天 09:11 CST 检查一次发布
    - cron: '11 1 * * *'           # 09:11 CST (01:11 UTC) 每天
    # 工作日下午补充检查
    - cron: '48 5 * * 1,3,5'       # 13:48 CST (05:48 UTC) 周一三五
    - cron: '23 9 * * 2,4'         # 17:23 CST (09:23 UTC) 周二四
  workflow_dispatch:
    # 手动触发用于测试

permissions:
  contents: write

jobs:
  content-release:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Checkout content-polishing branch
        uses: actions/checkout@v4
        with:
          ref: content-polishing
          fetch-depth: 0

      - name: Sync branches
        run: |
          git config user.name "Gambonan Bot"
          git config user.email "bot@gambonanzaguide.com"
          git fetch origin main
          # Try merge main into content-polishing; if diverged, rebase instead
          if ! git merge origin/main --no-edit 2>/dev/null; then
            echo "Branches diverged, rebasing content-polishing onto main..."
            git merge --abort
            git rebase origin/main || { echo "::error::Rebase failed — manual fix required"; exit 1; }
          fi

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: false

      - name: Auto-publish hidden articles
        run: python3 .github/scripts/auto-publish.py

      - name: Rebuild site with Hugo
        run: hugo --minify

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: Push content-polishing changes
        run: |
          git add layouts/index.html
          git commit -m "auto-update: homepage latest guides" || true
          git push origin content-polishing

      - name: Merge to main
        run: |
          git fetch origin main
          git checkout main
          git merge content-polishing --no-edit
          git push origin main
