<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KCX7SWRL8B"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-KCX7SWRL8B');
  </script>
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="keywords" content="{{ .Site.Params.keywords }}">
  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="alternate" hreflang="en" href="{{ .Permalink }}">
  <link rel="alternate" hreflang="zh-CN" href="https://translate.google.com/translate?hl=zh-CN&sl=en&u={{ .Permalink }}">
  <link rel="alternate" hreflang="ja" href="https://translate.google.com/translate?hl=ja&sl=en&u={{ .Permalink }}">
  <link rel="alternate" hreflang="x-default" href="{{ .Permalink }}">
  <link rel="stylesheet" href="/css/style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXX" crossorigin="anonymous"></script>
  {{ block "head" . }}{{ end }}
</head>
<body>
  {{ partial "header" . }}
  {{ partial "cookie-banner" . }}
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer" . }}
</body>
</html>
